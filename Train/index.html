{id:153,cat:"Physical Geo",src:"Advanced",t:"f",q:"What distinguishes the hydrology of a braided river from a meandering river?",a:"A braided river has multiple shallow, shifting channels separated by bars of sediment - formed where rivers carry a heavy sediment load and have high energy, often from glacial meltwater (e.g., Yukon River, New Zealand's Waimakariri). A meandering river has a single sinuous channel with wide lateral curves - formed in low-gradient, fine-sediment environments where the river has enough energy to erode banks but not enough to carry coarse sediment (e.g., Mississippi, Saskatchewan)."},
{id:154,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is river capture (stream piracy) and what landform evidence indicates where it has occurred?",a:"Stream piracy or river capture occurs when a more actively eroding river headwardly extends its drainage basin until it intersects and 'captures' a tributary of an adjacent river system, diverting that flow. Evidence: a wind gap (a dry valley notch in a ridge where the captured stream once flowed), an elbow of capture (sharp bend in the capturing river), and a misfit stream (a small stream flowing in a valley clearly too large for it - the old river was larger before capture)."},
{id:155,cat:"Physical Geo",src:"Advanced",t:"f",q:"The Mekong River is shared by six countries from its source to its delta. Name all six in order from north to south.",a:"China, Myanmar, Laos, Thailand, Cambodia, Vietnam. The Mekong originates on the Tibetan Plateau and empties into the South China Sea via the Mekong Delta in Vietnam."},
// === SOILS AND AGRICULTURE ===
{id:156,cat:"Physical Geo",src:"Advanced",t:"f",q:"Name the five major soil orders found in Canada from north to south, and describe the climate and vegetation associated with each.",a:"Cryosols (Arctic tundra, permafrost). Brunisols (boreal forest, poorly developed). Luvisols (mixed forest, leached clay). Chernozems (grasslands/prairies, organic-rich black soil). Podzols (coniferous forest, acidic leaching). Vertisols and Gleysols also occur in wetland and clay-rich areas."},
{id:157,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is salinization of agricultural soils, where in Canada does it occur, and what causes it?",a:"Salinization is the accumulation of soluble salts in the root zone, making soil toxic to most crops. In Canada it occurs on the Prairies - particularly in Saskatchewan and Alberta. Causes: natural salt-rich parent material (glacial lake sediments), inadequate drainage preventing salt leaching, and irrigation practices that raise the water table and bring dissolved salts to the surface through capillary action."},
{id:158,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is the Green Revolution, who led it, and what were its ecological costs?",a:"The Green Revolution (1950s-1970s) was the development and spread of high-yield variety (HYV) cereal crops - especially wheat and rice - led by Norman Borlaug. It dramatically increased food production in Asia and Latin America. Ecological costs: HYV crops required intensive irrigation, fertilizer, and pesticide inputs; reduced agricultural biodiversity (replacing thousands of traditional varieties with few HYV strains); increased water table depletion; and created chemical runoff problems in rivers and groundwater."},
// === GEOPOLITICAL ISSUES - CURRENT ===
{id:159,cat:"World Political",src:"Current",t:"f",q:"What is the significance of the South China Sea dispute beyond territorial waters, and what specific geological feature is central to it?",a:"The South China Sea carries approximately 30 percent of global annual maritime trade. China claims approximately 90 percent of it under the Nine-Dash Line - rejected by a 2016 International Tribunal ruling. The geological feature at the centre is the continental shelf and its submarine hydrocarbon deposits, estimated at 125 billion barrels of oil equivalent. China has built artificial islands on submerged reefs to establish military installations and territorial claims."},
{id:160,cat:"World Political",src:"Current",t:"f",q:"What is the Belt and Road Initiative (BRI) and what are its primary geopolitical critiques?",a:"China's BRI is a massive infrastructure investment program across Asia, Africa, Europe, and Latin America - building roads, railways, ports, and pipelines. Primary critiques: (1) Debt-trap diplomacy - loans structured so recipient countries cannot repay, forcing cession of strategic assets (e.g., China took a 99-year lease on Sri Lanka's Hambantota Port in 2017). (2) Environmental damage. (3) Undermining multilateral governance by creating bilateral Chinese-dependent relationships."},
{id:161,cat:"World Political",src:"Current",t:"f",q:"What is the specific role of Taiwan in the global semiconductor supply chain and why does this make the Taiwan Strait dispute strategically critical?",a:"Taiwan Semiconductor Manufacturing Company (TSMC) produces approximately 90 percent of the world's most advanced semiconductor chips (those smaller than 10 nanometres). These chips power everything from smartphones to military systems. Any disruption to TSMC production - whether from conflict or blockade - would immediately cripple global electronics manufacturing and cause severe economic damage to the US, Japan, and South Korea."},
{id:162,cat:"World Political",src:"Current",t:"f",q:"What is AUKUS and what specific military technology does it involve?",a:"AUKUS is a trilateral security partnership between Australia, the United Kingdom, and the United States announced in September 2021. It primarily involves helping Australia acquire nuclear-powered (not nuclear-armed) submarines - the first time the US has shared this technology outside of its arrangement with the UK since 1958. It also includes cooperation on AI, quantum computing, and undersea capabilities."},
// === WILDLIFE AND CONSERVATION ===
{id:163,cat:"Wildlife",src:"Advanced",t:"f",q:"What is the CITES convention and name three Canadian species it protects?",a:"CITES (Convention on International Trade in Endangered Species of Wild Fauna and Flora, 1973) regulates international trade in wildlife to prevent it driving species to extinction. Canadian species protected: (1) North Atlantic right whale (Appendix I - no commercial trade). (2) Polar bear (Appendix II - trade requires permits). (3) American ginseng (Appendix II - vulnerable to overharvesting for traditional medicine markets)."},
{id:164,cat:"Wildlife",src:"Advanced",t:"f",q:"What is the Endangered Species Act (SARA) in Canada and how does it differ from a similar US law?",a:"The Species at Risk Act (SARA, 2002) provides legal protection for wildlife species at risk in Canada. Unlike the US Endangered Species Act, SARA's protections largely apply only on federal lands (10% of Canada) by default - provincial and territorial lands require separate action. Critical habitat protection on private land requires additional steps. Critics argue SARA is weaker than the US law because most Canadian habitat is on provincial Crown land not automatically protected."},
{id:165,cat:"Wildlife",src:"Advanced",t:"f",q:"Describe the specific threats facing boreal caribou in Canada and why they are an indicator species for boreal forest health.",a:"Boreal caribou (Rangifer tarandus caribou) face three primary threats: (1) Habitat loss from seismic lines, roads, and cut blocks that fragment old-growth lichen-rich forest. (2) Apparent competition - linear features allow wolves to travel faster and encounter caribou more, even where caribou density is low. (3) Climate change reducing lichen availability. They are indicator species because they require large, undisturbed old-growth boreal forest - their decline signals ecosystem-level degradation."},
{id:166,cat:"Wildlife",src:"Advanced",t:"f",q:"What is the minimum viable population concept in conservation biology and why is it important for protected area design?",a:"Minimum viable population (MVP) is the smallest isolated population that has a specified probability of surviving for a given period (typically 95% chance of surviving 100 years). Populations below MVP face extinction risk from inbreeding depression, genetic drift, and demographic stochasticity. For protected area design, MVP calculations show that small reserves cannot sustain top predators (grizzly bears, wolves) which need vast territories - informing the need for wildlife corridors connecting protected areas."},
{id:167,cat:"Wildlife",src:"Advanced",t:"f",q:"What is the Convention on Biological Diversity (CBD) and what is its triple goal?",a:"The CBD (1992, Rio) is the main international treaty addressing biodiversity. Its triple goal: (1) Conservation of biological diversity. (2) Sustainable use of its components. (3) Fair and equitable sharing of benefits arising from the use of genetic resources. The Kunming-Montreal Global Biodiversity Framework (2022) set the 30x30 target under the CBD framework."},
// === ADVANCED CANADIAN HUMAN GEOGRAPHY ===
{id:168,cat:"Can. Human",src:"Advanced",t:"f",q:"What is the 'staple trap' in Canada's economic history and give two examples of staples that defined successive economic eras?",a:"The staple trap is the economic vulnerability created when a country becomes dependent on exporting unprocessed raw materials rather than developing value-added manufacturing. Canadian examples: beaver fur (17th-18th centuries driving the fur trade), cod (16th-early 20th centuries driving Atlantic settlement), wheat (late 19th-20th centuries opening the Prairies), and oil sands bitumen (20th-21st centuries)."},
{id:169,cat:"Can. Human",src:"Advanced",t:"f",q:"Explain the concept of equalization payments in Canadian federalism and why they are politically contentious.",a:"Equalization payments are federal transfers to provinces with below-average fiscal capacity, ensuring all Canadians have access to reasonably comparable public services at reasonably comparable tax rates. Currently Alberta, BC, Saskatchewan, and Newfoundland (in good years) do not receive equalization. Quebec, despite having significant wealth, is historically the largest recipient due to the formula's measurement of fiscal capacity. Alberta has long objected to paying into a system that benefits Quebec, contributing to Western alienation."},
{id:170,cat:"Can. Human",src:"Advanced",t:"f",q:"What is the National Capital Region and how is its governance unusual compared to other Canadian urban areas?",a:"The National Capital Region (NCR) is the region surrounding Ottawa, Ontario and Gatineau, Quebec - administered by the National Capital Commission (NCC), a federal Crown corporation. This is unusual because: (1) it straddles two provinces, (2) the federal government directly controls and manages many public spaces and planning decisions that would normally be municipal or provincial jurisdiction, and (3) the NCC owns substantial land in both provinces for parks and federal facilities."},
// === WORLD PHYSICAL GEOGRAPHY - DETAILED ===
{id:171,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is the difference between a continental shelf, continental slope, and abyssal plain?",a:"Continental shelf: the gently sloping underwater extension of a continent, typically less than 200 m deep, rich in marine life. Continental slope: the steep drop at the shelf edge descending to approximately 3,000 m. Abyssal plain: the flat, deep ocean floor typically at 3,000-6,000 m depth, covered in fine sediment - the most extensive terrain feature on Earth."},
{id:172,cat:"Physical Geo",src:"Advanced",t:"f",q:"What are turbidity currents and what landform do they create on the ocean floor?",a:"Turbidity currents are fast-moving, sediment-laden underwater currents triggered by earthquakes, overloading of sediment on the continental slope, or storm events. They rush down the continental slope and spread across the abyssal plain, depositing alternating coarse and fine layers called turbidites. Over time these build submarine fans (deep-sea fans), including the world's largest - the Bengal Fan and the Indus Fan."},
{id:173,cat:"Physical Geo",src:"Advanced",t:"f",q:"Describe the water cycle (hydrological cycle) and name four processes involved.",a:"The water cycle is the continuous circulation of water through Earth's atmosphere, land surface, and subsurface. Key processes: (1) Evaporation (surface water to water vapour). (2) Transpiration (plants release water vapour). (3) Condensation (water vapour forms clouds). (4) Precipitation (water falls as rain or snow). (5) Infiltration (water enters soil). (6) Surface runoff (water flows to streams). (7) Groundwater flow (water moves through aquifers)."},
{id:174,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is the albedo of fresh snow, old sea ice, ocean water, and tropical forest, and why do these differences matter for climate?",a:"Fresh snow: 80-90%. Old sea ice: 50-70%. Ocean water: 5-10%. Tropical forest: 10-15%. These differences are critical because surfaces absorb heat proportional to (1 - albedo). As Arctic sea ice is replaced by open ocean, absorbed solar energy roughly doubles, amplifying warming. This ice-albedo feedback loop explains why the Arctic warms faster than the global average."},
{id:175,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is the difference between weather systems in the mid-latitudes versus the tropics in terms of origin and structure?",a:"Mid-latitude weather (30-60 degrees) is dominated by frontal systems - organized boundaries between air masses of different temperature and humidity, driven by the Polar Jet Stream and temperature contrasts. Tropical weather is dominated by convective systems - local heating drives air upward, forming towering cumulonimbus clouds, heavy rainfall, and thunderstorms without the distinct air mass boundaries of frontal systems. Tropical cyclones (hurricanes, typhoons) form over warm tropical oceans without frontal structure."},
// === DUTCH AUCTION QUESTIONS ===
{id:301,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this remote Canadian location:",clues:["It is the northernmost permanently inhabited civilian settlement in the world, located at 82 degrees 30 minutes North.","It sits on Ellesmere Island in Nunavut and was established in 1950 as a weather and research station.","Its name in Inuktitut refers to a narrow inlet, and it experiences the most extreme temperature range in Canada.","Its permanent civilian population is fewer than 10, maintained by government researchers and staff."],a:"Alert, Nunavut - Canada's northernmost permanently inhabited community."},
{id:302,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this Canadian legal decision:",clues:["This 1997 Supreme Court of Canada ruling did not grant Aboriginal title but fundamentally changed how it is proven.","It established that oral histories and traditional narratives are admissible as evidence of land occupation.","The case involved the Gitxsan and Wet'suwet'en peoples of northwestern British Columbia.","It set the legal test for Aboriginal title that all subsequent Canadian cases still apply."],a:"Delgamuukw v. British Columbia (1997)."},
{id:303,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this ocean feature:",clues:["It is the world's longest mountain chain and runs approximately 65,000 km through all the world's ocean basins.","It is where tectonic plates diverge, and new oceanic crust is continuously formed by upwelling magma.","On land it is visible in Iceland, where the feature crosses above sea level and can be walked across.","The deepest and longest sections are in the Atlantic Ocean."],a:"The Mid-Ocean Ridge system (specifically the Mid-Atlantic Ridge is the longest individual section above the ocean floor)."},
{id:304,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this environmental agreement:",clues:["Adopted at the 1992 Rio Earth Summit, it entered into force in 1994 with near-universal ratification.","Its ultimate objective is to stabilize greenhouse gas concentrations at a level preventing dangerous human interference with the climate system.","The annual meetings of parties produced the Kyoto Protocol (1997) and the Paris Agreement (2015).","Canada signed it in 1992, ratified it in 1992, and uses it as the framework for all subsequent climate commitments."],a:"The United Nations Framework Convention on Climate Change (UNFCCC)."},
{id:305,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this world river:",clues:["It is the world's largest river by water volume - discharging approximately 20 percent of all freshwater entering Earth's oceans.","It flows approximately 6,400 km through South America and drains a basin of approximately 7 million km2.","Its drainage basin contains approximately 10 percent of all species on Earth.","It flows generally eastward from the Andes to the Atlantic Ocean, passing through Brazil."],a:"The Amazon River."},
{id:306,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this geological feature in Canada:",clues:["It is the world's largest confirmed ancient meteorite impact structure in Canada.","The impact occurred approximately 1.85 billion years ago and created a circular basin approximately 250 km in diameter.","The impact concentrated nickel, copper, platinum group elements, and cobalt into extraordinarily rich mineral deposits.","The city of Sudbury, Ontario sits within it and it is sometimes called a Multi-Ring Impact Basin."],a:"The Sudbury Basin (Sudbury Astrobleme or Sudbury Impact Structure)."},
{id:307,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this endangered Canadian ecosystem:",clues:["It covers approximately 0.3 percent of Canada's land area but supports over 30 percent of its terrestrial biodiversity.","It receives less than 300 mm of precipitation annually and is Canada's only true semi-arid desert ecosystem.","It is located in the Okanagan and Thompson River valleys of southern British Columbia.","It is home to the western rattlesnake, burrowing owl, tiger salamander, and antelope brush - species found nowhere else in Canada."],a:"Canada's South Okanagan desert ecosystem (Antelope Brush and Bunchgrass biogeoclimatic zones)."},
{id:308,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this international figure and their geographic significance:",clues:["Born in 1901 in Ontario, this person challenged gender barriers through a geographic achievement.","She was the first woman to pilot an aircraft solo across the Atlantic Ocean, flying from Harbour Grace, Newfoundland.","She departed from a small Newfoundland town in May 1932, completing the transatlantic crossing in approximately 15 hours.","She went missing over the Pacific Ocean in 1937 during an attempted circumnavigation and was declared legally dead in 1939."],a:"Amelia Earhart - she departed from Harbour Grace, Newfoundland for her 1932 solo Atlantic crossing."},
{id:309,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this Canadian geographic achievement:",clues:["This 1,600-km journey was completed in 1793, making its leader the first European to cross North America by land north of Mexico.","The explorer worked for the North West Company and used a combination of Indigenous guides, birchbark canoes, and overland travel.","He descended the Peace River, crossed the Rocky Mountains through the Peace Pass, and followed the Bella Coola River to the Pacific.","He signed his name and date on a rock at Bella Coola using red ochre and grease, which can still be read today as a Parks Canada plaque."],a:"Alexander Mackenzie's 1793 overland crossing of North America - reaching the Pacific Coast near present-day Bella Coola, British Columbia."},
{id:310,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this global climate pattern:",clues:["This atmospheric-oceanic coupled system oscillates on an irregular cycle of 2 to 7 years.","During one phase, trade winds weaken, warm water pools in the eastern Pacific, and the jet stream shifts northward.","During the opposite phase, trade winds strengthen, the eastern Pacific cools, and the jet stream shifts southward.","These two phases dramatically alter precipitation patterns globally, causing droughts in Australia and East Africa and flooding in Peru."],a:"The El Nino-Southern Oscillation (ENSO) - El Nino (warm phase) and La Nina (cool phase)."},
{id:311,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this Canadian economic-geographic term:",clues:["This economic theory was developed by Canadian economic historian Harold Innis in the 1930s.","It argues that Canada's economic and political development was fundamentally shaped by the successive export of unprocessed natural resources.","It explains why Canada developed along an east-west axis (transportation routes for resource export) rather than north-south (natural geographic drainage).","The resources in question included beaver fur, cod, timber, wheat, pulp and paper, and petroleum."],a:"The Staples Theory (or Staple Theory of Economic Growth) by Harold Innis."},
{id:312,cat:"Dutch Auction",src:"Advanced",t:"d",q:"Identify this geographic chokepoint:",clues:["This 30-km wide strait connects the Mediterranean Sea to the Atlantic Ocean.","It has been militarily strategic since antiquity and was controlled by Phoenicians, Carthaginians, Romans, Moors, and Spanish.","The British seized its southern side in 1704 and it has remained a British Overseas Territory ever since.","The northern side is Spain and the southern side (Jebel Musa) is Morocco - together forming the mythological Pillars of Hercules."],a:"The Strait of Gibraltar (with the Rock of Gibraltar as the British territory on the northern side)."}
];

var state={mode:"flash",cat:"All",src:"All Sources",search:"",idx:0,showA:false,clueN:0,correct:0,wrong:0,answered:{},shuffled:false,sOrder:[]};

function cats(){var c=["All"],s={};Q.forEach(function(q){if(!s[q.cat]){s[q.cat]=1;c.push(q.cat);}});return c.sort(function(a,b){return a==="All"?-1:b==="All"?1:a.localeCompare(b);});}
function srcs(){var c=["All Sources"],s={};Q.forEach(function(q){if(!s[q.src]){s[q.src]=1;c.push(q.src);}});return c;}
function filtered(){return Q.filter(function(q){var mc=state.cat==="All"||q.cat===state.cat;var ms=state.src==="All Sources"||q.src===state.src;var mq=!state.search||q.q.toLowerCase().indexOf(state.search.toLowerCase())!==-1||q.a.toLowerCase().indexOf(state.search.toLowerCase())!==-1;return mc&&ms&&mq;});}
function list(){var f=filtered();if(!state.shuffled||state.sOrder.length!==f.length)return f;return state.sOrder.map(function(i){return f[i];}).filter(Boolean);}

function shuffle(){var f=filtered();if(!state.shuffled){var a=[];for(var i=0;i<f.length;i++)a.push(i);for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}state.sOrder=a;}state.shuffled=!state.shuffled;state.idx=0;state.showA=false;state.clueN=0;render();}
function reset(){state.correct=0;state.wrong=0;state.answered={};state.idx=0;state.showA=false;state.clueN=0;state.shuffled=false;state.sOrder=[];render();}
function go(d){var l=list();state.idx=Math.max(0,Math.min(state.idx+d,l.length-1));state.showA=false;state.clueN=0;render();}
function mark(ok){var l=list();var c=l[state.idx];if(c&&!state.answered[c.id]){if(ok)state.correct++;else state.wrong++;state.answered[c.id]=true;}go(1);}
function setMode(m){state.mode=m;state.showA=false;state.clueN=0;render();}
function setCat(c){state.cat=c;state.idx=0;state.showA=false;state.clueN=0;render();}
function setSrc(s){state.src=s;state.idx=0;state.showA=false;state.clueN=0;render();}
function setSearch(s){state.search=s;state.idx=0;state.showA=false;state.clueN=0;render();}
function reveal(){state.showA=true;render();}
function nextClue(){var l=list();var c=l[state.idx];if(c)state.clueN=Math.min(state.clueN+1,c.clues.length-1);render();}
function browseGo(i,d){state.idx=i;state.mode=d?"dutch":"flash";state.showA=false;state.clueN=0;render();}

function render(){
var l=list();var total=l.length;var cur=l[Math.min(state.idx,total-1)];var pct=total>0?Math.round(((state.idx+1)/total)*100):0;var acc=(state.correct+state.wrong)>0?Math.round((state.correct/(state.correct+state.wrong))*100):null;var isDutch=cur&&cur.t==="d";var cs=cats();var ss=srcs();var h="";

// HEADER
h+='<div class="header">';
h+='<div class="header-top">';
h+='<div><div class="title">Canadian Geographic Challenge &mdash; Finals Prep Set 4</div>';
h+='<div class="subtitle">'+Q.length+' questions &nbsp;&bull;&nbsp; '+total+' in current filter &nbsp;&bull;&nbsp; Non-duplicating set</div></div>';
h+='<div class="score-row">';
h+='<span class="score-pill s-c">Correct: '+state.correct+'</span>';
h+='<span class="score-pill s-w">Wrong: '+state.wrong+'</span>';
if(acc!==null)h+='<span class="score-pill s-p">'+acc+'%</span>';
h+='</div></div></div>';

// TABS
h+='<div class="tabs">';
[["flash","Flashcard"],["dutch","Dutch Auction"],["browse","Browse"]].forEach(function(t){h+='<button class="tab'+(state.mode===t[0]?" active":"")+'" onclick="setMode(\''+t[0]+'\')">'+t[1]+'</button>';});
h+='</div>';
h+='<div class="tab-controls">';
h+='<button class="ctrl-btn'+(state.shuffled?" on":"")+'" onclick="shuffle()">Shuffle '+(state.shuffled?"ON":"OFF")+'</button>';
h+='<button class="ctrl-btn" onclick="reset()">Reset Scores</button>';
h+='</div>';

// FILTERS
h+='<div class="filters"><div class="cat-scroll">';
cs.forEach(function(c){h+='<button class="cat-btn'+(state.cat===c?" active":"")+'" onclick="setCat(\''+c.replace(/'/g,"&#39;")+'\')">'+(c.length>20?c.substring(0,18)+'..':c)+'</button>';});
h+='</div><div class="filter-row">';
h+='<select onchange="setSrc(this.value)">';
ss.forEach(function(s){h+='<option value="'+s+'"'+(state.src===s?" selected":"")+'>'+s+'</option>';});
h+='</select>';
h+='<input type="text" placeholder="Search questions and answers..." value="'+(state.search||"")+'" oninput="setSearch(this.value)" />';
h+='</div></div>';

// PROGRESS
if(total>0){
h+='<div class="progress">';
h+='<div class="progress-meta"><span>'+(state.idx+1)+' / '+total+'</span><span>'+pct+'% complete &nbsp;&bull;&nbsp; '+(cur?cur.src:"")+'</span></div>';
h+='<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
h+='</div>';
}

if(!cur||total===0){h+='<div class="no-results">No questions match this filter. Try clearing your search or selecting a different category.</div>';document.getElementById("app").innerHTML=h;return;}

// BROWSE
if(state.mode==="browse"){
h+='<div class="browse-list">';
l.forEach(function(q,i){
h+='<div class="browse-item'+(i===state.idx?" active":"")+'" onclick="browseGo('+i+','+(q.t==="d"?1:0)+')">';
h+='<div class="browse-row"><span class="browse-tag">'+(q.t==="d"?"[DA] ":"")+q.cat+'</span>';
h+='<div><div class="browse-q">'+q.q+'</div>';
if(state.answered[q.id])h+='<div class="browse-a">'+q.a+'</div>';
h+='</div></div></div>';
});
h+='</div>';
}

// FLASHCARD
if(state.mode==="flash"){
h+='<div class="card-tag"><span class="tag">'+cur.cat+'</span>';
if(isDutch)h+='<span class="tag tag-da">Dutch Auction</span>';
if(state.answered[cur.id])h+='<span class="tag tag-done">Scored</span>';
h+='</div>';
h+='<div class="question-card"><div class="question-num">Question '+(state.idx+1)+' of '+total+'</div><div class="question-text">'+cur.q+'</div></div>';
if(!state.showA){
h+='<button class="reveal-btn" onclick="reveal()">Reveal Answer</button>';
}else{
h+='<div class="answer-card"><div class="answer-label">Answer</div><div class="answer-text">'+cur.a+'</div></div>';
h+='<div class="mark-row"><button class="mark-btn mark-c" onclick="mark(true)">Got it</button><button class="mark-btn mark-w" onclick="mark(false)">Review Again</button></div>';
}
}

// DUTCH AUCTION
if(state.mode==="dutch"){
if(!isDutch){
h+='<div class="question-card"><p style="color:#888;font-size:13px;font-family:Helvetica Neue,sans-serif;">This card is a standard flashcard, not a Dutch Auction question.</p>';
h+='<p style="color:#aaa;font-size:12px;margin-top:8px;font-family:Helvetica Neue,sans-serif;">Filter by category <strong>Dutch Auction</strong> to see only DA questions.</p>';
h+='<button class="reveal-btn" style="margin-top:14px;" onclick="setMode(\'flash\')">Switch to Flashcard Mode</button></div>';
}else{
h+='<div class="card-tag"><span class="tag tag-da">Dutch Auction</span><span class="tag">'+cur.cat+'</span></div>';
h+='<div class="question-card"><div class="da-q">'+cur.q+'</div>';
for(var i=0;i<=Math.min(state.clueN,cur.clues.length-1);i++){
h+='<div class="clue-box'+(i===state.clueN?" cur":"")+'">';
h+='<div class="clue-n">Clue '+(i+1)+' of '+cur.clues.length+'</div>';
h+='<div class="clue-text">'+cur.clues[i]+'</div></div>';
}
h+='<div class="da-actions">';
if(state.clueN<cur.clues.length-1&&!state.showA)h+='<button class="da-btn da-next" onclick="nextClue()">Next Clue &rarr;</button>';
if(!state.showA)h+='<button class="da-btn da-reveal" onclick="reveal()">Reveal Answer</button>';
h+='</div>';
if(state.showA)h+='<div class="answer-card" style="margin-top:12px;"><div class="answer-label">Answer</div><div class="answer-text">'+cur.a+'</div></div>';
h+='</div>';
if(state.showA)h+='<div class="mark-row"><button class="mark-btn mark-c" onclick="mark(true)">Got it</button><button class="mark-btn mark-w" onclick="mark(false)">Review Again</button></div>';
}
}

// NAV
if(state.mode!=="browse"){
h+='<div class="nav-row">';
h+='<button class="nav-btn" onclick="go(-1)"'+(state.idx===0?" disabled":"")+'">&larr; Previous</button>';
h+='<span class="nav-center">'+(state.idx+1)+' / '+total+'</span>';
h+='<button class="nav-btn" onclick="go(1)"'+(state.idx>=total-1?" disabled":"")+'>Next &rarr;</button>';
h+='</div>';
}

document.getElementById("app").innerHTML=h;
}

render();
</script>
</body>
</html>
