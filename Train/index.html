<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,'Times New Roman',serif;background:#fafaf8;color:#1c1c1c;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:20px 16px}

/* HEADER */
.header{border-bottom:2px solid #1c1c1c;padding-bottom:14px;margin-bottom:18px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.subtitle{font-size:12px;color:#666;margin-top:3px;font-family:'Helvetica Neue',sans-serif}
.score-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.score-pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:2px;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.3px}
.s-c{background:#1c1c1c;color:#fff}
.s-w{background:#d63031;color:#fff}
.s-p{background:#0984e3;color:#fff}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid #1c1c1c;width:fit-content;border-radius:2px;overflow:hidden;flex-wrap:wrap}
.tab{padding:7px 16px;font-size:12px;font-weight:600;border:none;border-right:1px solid #1c1c1c;cursor:pointer;background:#fafaf8;color:#555;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.5px;text-transform:uppercase}
.tab:last-child{border-right:none}
.tab.active{background:#1c1c1c;color:#fff}
.tab-controls{display:flex;gap:6px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.ctrl-btn{padding:5px 11px;font-size:11px;font-weight:600;border:1px solid #1c1c1c;border-radius:2px;cursor:pointer;background:#fafaf8;color:#1c1c1c;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.5px;text-transform:uppercase}
.ctrl-btn.on{background:#1c1c1c;color:#fff}

/* FILTERS */
.filters{margin-bottom:16px}
.cat-scroll{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.cat-btn{padding:4px 10px;font-size:11px;border:1px solid #ccc;border-radius:2px;cursor:pointer;background:#fff;color:#555;font-family:'Helvetica Neue',sans-serif;white-space:nowrap;transition:all 0.1s}
.cat-btn:hover{border-color:#1c1c1c;color:#1c1c1c}
.cat-btn.active{background:#1c1c1c;color:#fff;border-color:#1c1c1c}
.filter-row{display:flex;gap:8px;align-items:center}
.filter-row select{font-size:11px;padding:5px 8px;border:1px solid #ccc;border-radius:2px;background:#fff;font-family:'Helvetica Neue',sans-serif;cursor:pointer}
.filter-row input{font-size:12px;padding:5px 10px;border:1px solid #ccc;border-radius:2px;flex:1;font-family:'Helvetica Neue',sans-serif}
.filter-row input:focus{outline:1px solid #1c1c1c;border-color:#1c1c1c}

/* PROGRESS */
.progress{margin-bottom:16px}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px;font-family:'Helvetica Neue',sans-serif}
.progress-track{height:2px;background:#e0e0e0}
.progress-fill{height:2px;background:#1c1c1c;transition:width 0.3s}

/* CARD */
.card-tag{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 8px;border:1px solid #ddd;border-radius:2px;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.3px;color:#666;text-transform:uppercase}
.tag-da{border-color:#f39c12;color:#f39c12}
.tag-done{border-color:#aaa;color:#aaa}

.question-card{background:#fff;border:1px solid #1c1c1c;border-radius:2px;padding:22px;margin-bottom:12px;min-height:110px;box-shadow:3px 3px 0 #1c1c1c}
.question-text{font-size:15px;line-height:1.7;font-weight:500}
.question-num{font-size:11px;color:#aaa;font-family:'Helvetica Neue',sans-serif;margin-bottom:8px}

.reveal-btn{width:100%;padding:13px;font-size:12px;font-weight:600;cursor:pointer;background:#fafaf8;border:1px solid #1c1c1c;border-radius:2px;color:#1c1c1c;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.15s;box-shadow:2px 2px 0 #1c1c1c}
.reveal-btn:hover{background:#1c1c1c;color:#fff}

.answer-card{background:#f0f7f0;border:1px solid #2d9c5e;border-radius:2px;padding:16px;margin-bottom:12px;box-shadow:2px 2px 0 #2d9c5e}
.answer-label{font-size:10px;font-weight:700;color:#2d9c5e;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px}
.answer-text{font-size:14px;line-height:1.7}

.mark-row{display:flex;gap:8px;margin-bottom:12px}
.mark-btn{flex:1;padding:11px;font-size:12px;font-weight:600;border-radius:2px;cursor:pointer;border:1px solid;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.5px;text-transform:uppercase;transition:opacity 0.15s}
.mark-btn:active{transform:scale(0.98)}
.mark-c{background:#2d9c5e;color:#fff;border-color:#2d9c5e;box-shadow:2px 2px 0 #1a6e40}
.mark-w{background:#d63031;color:#fff;border-color:#d63031;box-shadow:2px 2px 0 #9b1c1c}

/* DUTCH AUCTION */
.da-q{font-size:13px;font-weight:600;color:#888;margin-bottom:12px;font-family:'Helvetica Neue',sans-serif}
.clue-box{padding:10px 13px;margin-bottom:7px;border:1px solid #ddd;border-radius:2px;background:#fafaf8}
.clue-box.cur{background:#fffbf0;border-color:#f39c12;box-shadow:2px 2px 0 #f39c12}
.clue-n{font-size:9px;font-weight:700;color:#aaa;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:3px}
.clue-box.cur .clue-n{color:#f39c12}
.clue-text{font-size:13px;line-height:1.5}
.da-actions{display:flex;gap:7px;margin-top:10px}
.da-btn{padding:7px 13px;font-size:11px;font-weight:600;border-radius:2px;cursor:pointer;border:1px solid;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.4px;text-transform:uppercase}
.da-next{background:#f39c12;color:#fff;border-color:#f39c12;box-shadow:2px 2px 0 #c0770e}
.da-reveal{background:#fafaf8;color:#555;border-color:#ccc}

/* BROWSE */
.browse-list{max-height:500px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:2px}
.browse-item{padding:10px 13px;border-bottom:1px solid #eee;cursor:pointer;background:#fff;transition:background 0.1s}
.browse-item:last-child{border-bottom:none}
.browse-item:hover{background:#f5f5f3}
.browse-item.active{background:#f0f7f0;border-left:3px solid #2d9c5e}
.browse-row{display:flex;gap:8px;align-items:flex-start}
.browse-tag{font-size:9px;padding:2px 6px;border:1px solid #ddd;border-radius:2px;color:#888;white-space:nowrap;flex-shrink:0;margin-top:2px;font-family:'Helvetica Neue',sans-serif;text-transform:uppercase}
.browse-q{font-size:12px;line-height:1.4}
.browse-a{font-size:11px;color:#888;margin-top:3px;font-style:italic}

/* NAV */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.nav-btn{padding:8px 20px;font-size:12px;font-weight:600;border:1px solid #1c1c1c;border-radius:2px;cursor:pointer;background:#fafaf8;color:#1c1c1c;font-family:'Helvetica Neue',sans-serif;letter-spacing:0.5px;text-transform:uppercase;box-shadow:2px 2px 0 #1c1c1c;transition:all 0.15s}
.nav-btn:hover:not(:disabled){background:#1c1c1c;color:#fff}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}
.nav-center{font-size:12px;color:#888;font-family:'Helvetica Neue',sans-serif}

.no-results{text-align:center;padding:3rem;color:#888;font-family:'Helvetica Neue',sans-serif;font-size:14px}
</style>

<script>
var Q=[
// === CANADIAN PHYSICAL GEOGRAPHY (ADVANCED) ===
{id:1,cat:"Can. Physical",src:"Advanced",t:"f",q:"The Cordilleran Ice Sheet covered western Canada during the last glaciation. Name the two main domes that formed it.",a:"The Cordilleran Ice Sheet was formed by the coalescence of the Coast Mountains ice dome and the Rocky Mountains ice dome, which merged across the interior plateaus of BC and Yukon."},
{id:2,cat:"Can. Physical",src:"Advanced",t:"f",q:"What is the geological term for the ancient bedrock terranes that underlie much of British Columbia, formed when oceanic fragments were accreted onto the western edge of North America?",a:"Accreted terranes (or exotic terranes) - displaced fragments of oceanic crust, volcanic arcs, and ancient seafloor that were tectonically added to the continental margin."},
{id:3,cat:"Can. Physical",src:"Advanced",t:"f",q:"The Interior Plateau of British Columbia is drained by three major river systems. Name them.",a:"The Fraser River, the Columbia River, and the Thompson River - all originating in the Rockies and draining westward through the plateau."},
{id:4,cat:"Can. Physical",src:"Advanced",t:"f",q:"What process is responsible for the formation of the drumlin fields in southern Ontario and the Prairie provinces?",a:"Subglacial erosion and deposition by the Laurentide Ice Sheet - moving ice streamlined previously deposited glacial till into elongated egg-shaped mounds aligned with ice flow direction."},
{id:5,cat:"Can. Physical",src:"Advanced",t:"f",q:"Name the three main physiographic regions of the Canadian Shield from west to east across northern Ontario.",a:"The Superior Uplands, the Lake Abitibi Lowlands, and the Laurentian Highlands - each representing distinct bedrock ages and glacial erosion patterns."},
{id:6,cat:"Can. Physical",src:"Advanced",t:"f",q:"Lake Nipigon in Ontario drains into Lake Superior via which river?",a:"The Nipigon River - it is also notable as the place where a crack in 2016 briefly severed the Trans-Canada Highway, isolating eastern and western Canada by road."},
{id:7,cat:"Can. Physical",src:"Advanced",t:"f",q:"What is the approximate elevation of the Columbia Icefield, and why does it sustain six outlet glaciers?",a:"The icefield sits at approximately 3,000 metres above sea level. It sustains six major outlet glaciers because its high plateau accumulates more snow than ablates, and the surrounding valleys channel ice flow in six separate directions."},
{id:8,cat:"Can. Physical",src:"Advanced",t:"f",q:"The Thelon River flows through one of Canada's most remote wilderness areas. Into which body of water does it ultimately drain?",a:"Baker Lake (Qamani'tuaq) and then Hudson Bay via Chesterfield Inlet, Nunavut."},
{id:9,cat:"Can. Physical",src:"Advanced",t:"f",q:"What geological feature makes the Sudbury Basin in Ontario unique, and what two economic outcomes did it produce?",a:"It is one of the world's largest confirmed ancient meteorite impact craters (astrobleme), approximately 1.85 billion years old. The impact concentrated nickel, copper, platinum group elements and cobalt into the world's most productive nickel mining district."},
{id:10,cat:"Can. Physical",src:"Advanced",t:"f",q:"The Mackenzie Delta is one of the largest in North America. Approximately how many lakes and channels does it contain?",a:"Approximately 25,000 lakes and countless distributary channels - making it the second largest delta in North America after the Mississippi."},
{id:11,cat:"Can. Physical",src:"Advanced",t:"f",q:"What is the precise name for the process where river water flows beneath the ice of a glacier through englacial conduits, reappearing as springs at the glacier snout?",a:"Subglacial drainage (englacial drainage) - water that melts internally or enters through crevasses flows under hydrostatic pressure through conduits within and beneath the ice."},
{id:12,cat:"Can. Physical",src:"Advanced",t:"f",q:"The Athabasca Sand Dunes in northern Saskatchewan are the most northerly active sand dune complex in the world. What rock type provides the sand supply?",a:"Athabasca sandstone (Proterozoic sandstone) - eroded from outcrops exposed along the lake shore and reworked by wind into active parabolic and transverse dune fields."},
{id:13,cat:"Can. Physical",src:"Precision",t:"f",q:"What is the precise area of Canada's total land mass in square kilometres?",a:"9,984,670 square kilometres (commonly rounded to 9.98 million km2)."},
{id:14,cat:"Can. Physical",src:"Precision",t:"f",q:"The Trans-Canada Highway's total length from Victoria BC to St. John's NL is approximately how many kilometres?",a:"Approximately 7,821 kilometres."},
{id:15,cat:"Can. Physical",src:"Precision",t:"f",q:"What is the approximate length of Canada's total coastline - the longest of any country in the world?",a:"Approximately 202,080 km (including mainland and islands)."},
// === CANADIAN HISTORY (ADVANCED) ===
{id:16,cat:"Can. History",src:"Advanced",t:"f",q:"The Royal Proclamation of 1763 did what for Indigenous peoples, and why is it still legally significant today?",a:"It recognized Indigenous peoples as nations with collective territorial rights, requiring Crown treaties before land could be purchased from Indigenous peoples. It remains the constitutional basis for treaty rights and the duty to consult - referenced in Section 35 of the Constitution Act, 1982."},
{id:17,cat:"Can. History",src:"Advanced",t:"f",q:"The Act of Union of 1841 united Upper and Lower Canada. What specific political problem did it create for French Canadians?",a:"It gave equal representation to Canada West (Upper Canada) and Canada East (Lower Canada) in the legislature despite Lower Canada having a larger population. This systematically diluted French Canadian political power - a deliberate policy to assimilate the French majority."},
{id:18,cat:"Can. History",src:"Advanced",t:"f",q:"What was the significance of the Persons Case of 1929 for Canadian women?",a:"The British Privy Council ruled that women were 'persons' under the British North America Act and therefore eligible to be appointed to the Canadian Senate. The Famous Five - Emily Murphy, Nellie McClung, Louise McKinney, Irene Parlby, and Henrietta Muir Edwards - brought the case."},
{id:19,cat:"Can. History",src:"Advanced",t:"f",q:"The Manitoba Schools Question of the 1890s created a constitutional crisis. What was at its core?",a:"Manitoba's legislature eliminated public funding for Catholic schools in 1890, violating protections established at Confederation. Francophone and Catholic communities demanded federal remedial legislation. Prime Minister Laurier's compromise (Laurier-Greenway Agreement) restored some French Catholic education but satisfied neither side."},
{id:20,cat:"Can. History",src:"Advanced",t:"f",q:"Name the four original provinces of Confederation in 1867 and the mechanism by which new provinces could join.",a:"Ontario, Quebec, Nova Scotia, and New Brunswick. New provinces join through a constitutional amendment under Section 146 of the Constitution Act, 1867 - by address of the Parliament of Canada and acceptance by the new province."},
{id:21,cat:"Can. History",src:"Advanced",t:"f",q:"What was the Statute of Westminster (1931) and what did it formally grant Canada?",a:"A British Parliament act that granted Canada and other Dominions full legislative independence - Canadian laws no longer required British approval, and no British law applied to Canada without Canadian consent. It effectively made Canada a fully sovereign nation in all but constitutional amendment."},
{id:22,cat:"Can. History",src:"Advanced",t:"f",q:"The FLQ Crisis of October 1970 led to what unprecedented peacetime government action in Canada?",a:"Prime Minister Trudeau invoked the War Measures Act - the only peacetime invocation in Canadian history - suspending civil liberties, allowing detention without charge, and deploying the military to Quebec following the kidnappings of British diplomat James Cross and Quebec Minister Pierre Laporte (who was murdered)."},
{id:23,cat:"Can. History",src:"Advanced",t:"f",q:"What was the Durham Report (1839) and what did Lord Durham recommend?",a:"A report commissioned after the 1837-38 Rebellions in Upper and Lower Canada. Durham recommended uniting the two Canadas (achieved in 1841) and granting responsible government - but also recommended the assimilation of French Canadians, which he described as 'a people with no history and no literature.'"},
{id:24,cat:"Can. History",src:"Advanced",t:"f",q:"Canada's first federal election was held in what year, and who became the first Prime Minister?",a:"1867 - Sir John A. Macdonald became Canada's first Prime Minister, leading the Conservative Party."},
{id:25,cat:"Can. History",src:"Advanced",t:"f",q:"The Numbered Treaties (1 through 11) were negotiated between what years, covering what geographic area?",a:"Between 1871 and 1921, covering the Prairie provinces, northern Ontario, and the Northwest Territories - approximately 40 percent of Canada's total land area."},
// === WORLD REGIONAL GEOGRAPHY ===
{id:26,cat:"World Regional",src:"Finals",t:"f",q:"The Fergana Valley is a densely populated agricultural basin shared by three former Soviet republics. Name them.",a:"Uzbekistan, Tajikistan, and Kyrgyzstan. The valley is one of Central Asia's most fertile regions and a persistent source of border tension since Soviet-era administrative boundaries split the valley between three republics."},
{id:27,cat:"World Regional",src:"Finals",t:"f",q:"Which South American country is both the world's driest country (on average) and contains the world's highest navigable lake?",a:"Bolivia - the Altiplano contains Lake Titicaca (3,812 m above sea level), the world's highest commercially navigable lake. Parts of Bolivia also include portions of the Atacama Desert."},
{id:28,cat:"World Regional",src:"Finals",t:"f",q:"Name the four countries whose territories make up the island of Borneo.",a:"Malaysia (Sabah and Sarawak), Brunei, Indonesia (Kalimantan), and... Borneo is shared among only three sovereign states: Malaysia, Brunei, and Indonesia. Note: there is no fourth - this is a common trap question."},
{id:29,cat:"World Regional",src:"Finals",t:"f",q:"The Balkan Peninsula is bordered by three seas. Name them.",a:"The Adriatic Sea (west), the Ionian Sea (southwest), and the Aegean Sea (southeast) - all extensions of the Mediterranean."},
{id:30,cat:"World Regional",src:"Finals",t:"f",q:"Which African country contains the Hoggar (Ahaggar) Mountains at its centre, and what type of terrain surrounds them?",a:"Algeria - the Hoggar Mountains are a volcanic massif rising from the Sahara Desert. The surrounding terrain is the Tanezrouft - one of the most arid and featureless parts of the entire Sahara, sometimes called the Land of Thirst."},
{id:31,cat:"World Regional",src:"Finals",t:"f",q:"The Patagonian Ice Field is the largest temperate ice mass in the Southern Hemisphere. Which two countries share it?",a:"Argentina and Chile - the Southern Patagonian Ice Field (13,000 km2) straddles the Andes along the border."},
{id:32,cat:"World Regional",src:"Finals",t:"f",q:"The Deccan Plateau covers much of peninsular India. What type of rock dominates it, and how was it formed?",a:"Flood basalt (the Deccan Traps) - formed approximately 66 million years ago by massive volcanic eruptions covering approximately 500,000 km2. The eruptions are linked to the end-Cretaceous mass extinction event."},
{id:33,cat:"World Regional",src:"Finals",t:"f",q:"The Kamchatka Peninsula contains the highest concentration of active volcanoes in the world. To which tectonic plate boundary type is it connected?",a:"A convergent subduction boundary - the Pacific Plate subducts beneath the Eurasian Plate along the Kuril-Kamchatka Trench, generating the volcanic arc."},
{id:34,cat:"World Regional",src:"Finals",t:"f",q:"Which Central American country has no military, established in its 1949 constitution, and abolished its armed forces?",a:"Costa Rica - the only country in the world with a constitutional prohibition on a standing army."},
{id:35,cat:"World Regional",src:"Finals",t:"f",q:"The Murray-Darling river system is Australia's most important river basin. Into which body of water does it drain?",a:"The Southern Ocean (via Encounter Bay and Lake Alexandrina, South Australia) - though in drought years the river frequently fails to reach the sea."},
// === INDIGENOUS PEOPLES - GLOBAL AND CANADIAN ===
{id:36,cat:"Indigenous",src:"Advanced",t:"f",q:"The Haudenosaunee Great Law of Peace (Gayanashagowa) is significant beyond Indigenous governance. What specific influence is it claimed to have had on the United States Constitution?",a:"Several historians and Indigenous scholars argue that the Great Law's principles of federalism, separation of powers, and democratic representation influenced the framers of the US Constitution through direct contact with Haudenosaunee leaders. Congress formally acknowledged this in 1988 through Senate Concurrent Resolution 76."},
{id:37,cat:"Indigenous",src:"Advanced",t:"f",q:"What is the specific term for the legal doctrine, originating in 15th-century papal bulls, that justified European colonization of Indigenous lands by declaring that non-Christian peoples had no rights to their territories?",a:"The Doctrine of Discovery - formally articulated in papal bulls including Romanus Pontifex (1455) and Inter Caetera (1493). The Vatican formally repudiated this doctrine in March 2023."},
{id:38,cat:"Indigenous",src:"Advanced",t:"f",q:"Explain the difference between status and non-status Indians under the Indian Act.",a:"A status Indian is a person registered under the Indian Act, receiving certain federal benefits and rights including reserve residency and band membership. A non-status Indian is a person of First Nations ancestry not registered - historically caused by provisions that stripped status from women who married non-status men, from people who enfranchised, or from those whose ancestry was not recorded. Bill C-31 (1985) restored status to many who had lost it."},
{id:39,cat:"Indigenous",src:"Advanced",t:"f",q:"What is the UNDRIP provision of Free Prior and Informed Consent (FPIC), and what is the central debate about its application in Canadian law?",a:"FPIC is the right of Indigenous peoples to give or withhold consent before projects affecting their lands proceed. The central Canadian debate is whether FPIC constitutes an absolute veto over development projects or merely a requirement for meaningful consultation. The federal government's position is that it does not create a veto; many Indigenous nations argue consent means consent."},
{id:40,cat:"Indigenous",src:"Advanced",t:"f",q:"The Specific Claims process and the Comprehensive Claims process serve different purposes in Canada. Distinguish between them.",a:"Specific Claims address grievances arising from the Crown's failure to fulfill obligations under existing treaties or the law - typically involving mismanagement of reserve lands or treaty violations. Comprehensive Claims address Aboriginal title and rights in areas where no treaty was signed - they result in new modern treaties defining land ownership, resource rights, and governance arrangements."},
{id:41,cat:"Indigenous",src:"Advanced",t:"f",q:"Name the seven clans of the Cherokee Nation and explain the matrilineal system that defines clan membership.",a:"The seven Cherokee clans are: Wolf, Deer, Bird, Paint, Long Hair, Wild Potato, and Blue. Clan membership is inherited through the mother - a child belongs to their mother's clan, not their father's. Marriage within the same clan is prohibited. This system created kinship networks across Cherokee communities."},
{id:42,cat:"Indigenous",src:"Advanced",t:"f",q:"The Idle No More movement began in Canada in 2012. What specific federal legislation sparked the protest and why?",a:"Bill C-45 (the Jobs and Growth Act, 2012) - an omnibus bill that amended the Navigable Waters Protection Act, removing environmental protections from thousands of lakes and rivers, and changed the Indian Act to make it easier to lease reserve lands without full community consent."},
{id:43,cat:"Indigenous",src:"Finals",t:"f",q:"What specific Supreme Court of Canada test, established in R. v. Sparrow (1990), governs when the Crown can infringe on Aboriginal rights protected under Section 35?",a:"The Sparrow Test - the Crown must show: (1) a valid legislative objective (conservation, public safety), and (2) the infringement upholds the honour of the Crown (minimal infringement, consultation, and priority given to Indigenous rights over competing interests)."},
// === PHYSICAL GEOGRAPHY - ADVANCED ===
{id:44,cat:"Physical Geo",src:"Advanced",t:"f",q:"Explain the difference between a graben and a horst in rift valley tectonics.",a:"A graben is a down-dropped crustal block between two parallel normal faults - forming a valley or basin (e.g., the Dead Sea). A horst is an uplifted crustal block between two parallel normal faults - forming a ridge or plateau. Together they create the alternating ridge-and-valley topography of rift zones."},
{id:45,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is the Wilson Cycle and why is it important for understanding continental geography?",a:"The Wilson Cycle describes the complete lifecycle of an ocean basin: from continental rifting (incipient ocean), to full ocean spreading, to subduction and closure, to continental collision. It explains how supercontinents form and break apart repeatedly over geological time, predicting that the Atlantic Ocean will eventually close as the Americas collide with Europe and Africa again in approximately 250 million years."},
{id:46,cat:"Physical Geo",src:"Advanced",t:"f",q:"The Coriolis effect deflects wind and ocean currents. Precisely how does the deflection differ between the Northern and Southern Hemispheres?",a:"In the Northern Hemisphere, moving air and water is deflected to the RIGHT of its direction of travel. In the Southern Hemisphere, it is deflected to the LEFT. This is caused by Earth's rotation - the effect is zero at the equator and maximum at the poles. It drives cyclone rotation (counterclockwise in the north, clockwise in the south)."},
{id:47,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is the difference between a stalagmite and a stalactite and the mnemonic used to distinguish them?",a:"A stalactite hangs from the ceiling downward (tite = tight to the ceiling). A stalagmite grows up from the floor (mite = might reach the ceiling). Both are speleothems formed by calcium carbonate precipitation from dripping water in caves."},
{id:48,cat:"Physical Geo",src:"Advanced",t:"f",q:"Define the concept of base level in geomorphology and give a practical example of how human activity has altered it.",a:"Base level is the lowest elevation to which a river can erode its channel - for most rivers this is sea level. A practical human alteration: dam construction creates a new local base level upstream (the reservoir surface), causing sediment deposition above the dam and erosion below it, where the river has lost its sediment load and scours the channel down."},
{id:49,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is the Hadley Cell and why does it produce both the tropical rainforest biome and the world's major subtropical deserts?",a:"The Hadley Cell is an atmospheric circulation loop: warm, moist equatorial air rises (creating low pressure, heavy rainfall, and tropical rainforests), cools at altitude, flows poleward, and descends at approximately 30 degrees latitude (creating high pressure, dry air, and the world's major deserts including the Sahara, Arabian, and Australian deserts)."},
{id:50,cat:"Physical Geo",src:"Advanced",t:"f",q:"Distinguish between mechanical (physical) weathering and chemical weathering. Give one Canadian example of each.",a:"Mechanical weathering breaks rock into smaller pieces without changing its composition (e.g., frost wedging in the Canadian Rockies shattering cliff faces). Chemical weathering changes the mineral composition of rock through chemical reactions (e.g., acid rain dissolving limestone in Ontario's Niagara Escarpment, creating karst features)."},
{id:51,cat:"Physical Geo",src:"Advanced",t:"f",q:"The Pacific Ocean has both the world's deepest trench and its most extensive mid-ocean ridge. Name both.",a:"The Mariana Trench (10,935 m deep at Challenger Deep) and the East Pacific Rise - the fastest-spreading mid-ocean ridge at 15 to 20 cm per year."},
{id:52,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is the difference between a delta and an alluvial fan, and under what hydrological conditions does each form?",a:"A delta forms where a river enters a standing body of water (lake or sea) and loses velocity, depositing sediment in a fan shape at the mouth. An alluvial fan forms where a high-gradient mountain stream enters a flat plain and suddenly loses velocity, spreading sediment in a fan on land. Deltas form in water; alluvial fans form on land."},
{id:53,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is permafrost, and why is thermokarst a significant landscape hazard as it degrades?",a:"Permafrost is permanently frozen ground (at 0 degrees C or below for at least two years). When the ice within permafrost melts, the ground collapses, forming depressions called thermokarst. This destabilizes infrastructure, creates subsidence hazards, releases methane from decomposing organic matter, and fundamentally alters drainage patterns across the Arctic."},
{id:54,cat:"Physical Geo",src:"Precision",t:"f",q:"Name the five Great Lakes in order from west to east.",a:"Superior, Michigan, Huron, Erie, Ontario - remembered by the acronym SMHEO or the mnemonic Silly Men Have Enormous Organs."},
{id:55,cat:"Physical Geo",src:"Precision",t:"f",q:"What is the approximate depth difference between the world's deepest point (Challenger Deep) and the height of Mount Everest above sea level?",a:"Challenger Deep is approximately 10,935 m below sea level. Mount Everest is 8,849 m above sea level. The difference is approximately 19,784 m - or nearly 20 km of total relief on Earth's surface."},
{id:56,cat:"Physical Geo",src:"Precision",t:"f",q:"In what year did Alfred Wegener propose the theory of continental drift, and what was the main evidence he used?",a:"1912 - Wegener used the jigsaw fit of the continents, matching fossil records across ocean basins (Glossopteris flora on Gondwana continents), and evidence of past glaciation in now-tropical regions."},
// === CLIMATE SCIENCE (ADVANCED) ===
{id:57,cat:"Climate and Env",src:"Advanced",t:"f",q:"What is the difference between weather and climate, stated with scientific precision?",a:"Weather is the short-term state of the atmosphere at a specific location (temperature, precipitation, wind, humidity over hours to days). Climate is the long-term statistical average of atmospheric conditions at a location, typically calculated over a 30-year reference period (as defined by the World Meteorological Organization)."},
{id:58,cat:"Climate and Env",src:"Advanced",t:"f",q:"The IPCC uses five Shared Socioeconomic Pathways (SSPs) in its Sixth Assessment Report. What does SSP1-1.9 represent versus SSP5-8.5?",a:"SSP1-1.9 is the most optimistic scenario - sustainable development, rapid decarbonization, limiting warming to approximately 1.5 degrees C. SSP5-8.5 is the most pessimistic high-emissions scenario - fossil fuel-intensive development with approximately 4-5 degrees C warming by 2100."},
{id:59,cat:"Climate and Env",src:"Advanced",t:"f",q:"What is the Arctic Amplification phenomenon, and what causes it?",a:"Arctic Amplification is the fact that the Arctic warms 2 to 4 times faster than the global average. It is caused by multiple reinforcing feedbacks: ice-albedo feedback (darker ocean absorbs more heat), water vapor feedback (warmer air holds more moisture), and lapse rate feedback (arctic temperature inversions trap heat closer to the surface)."},
{id:60,cat:"Climate and Env",src:"Advanced",t:"f",q:"Explain the concept of carbon sequestration and name two Canadian ecosystems that are critical carbon sinks.",a:"Carbon sequestration is the long-term capture and storage of atmospheric CO2 in biological or geological reservoirs. Two critical Canadian carbon sinks: (1) The boreal forest and peatlands of the Hudson Bay Lowlands (storing millennia of accumulated organic carbon). (2) The Pacific Coast old-growth forests, which store more carbon per hectare than any terrestrial ecosystem on Earth."},
{id:61,cat:"Climate and Env",src:"Advanced",t:"f",q:"What is the 'urban heat island' effect and what three urban design strategies most effectively reduce it?",a:"Cities are warmer than surrounding rural areas because buildings, pavement, and reduced vegetation absorb and store more solar radiation. Three mitigation strategies: (1) Green roofs and urban forests (evapotranspiration cools air). (2) High-albedo surfaces (white or reflective roofing and pavement). (3) Urban water features (evaporative cooling)."},
{id:62,cat:"Climate and Env",src:"Advanced",t:"f",q:"What is the difference between mitigation and adaptation in the context of climate change, and why are both necessary?",a:"Mitigation reduces greenhouse gas emissions to slow future warming (e.g., renewable energy, electric vehicles, carbon capture). Adaptation adjusts human systems to the warming that is already locked in (e.g., sea walls, drought-resistant crops, wildfire-resilient building codes). Both are necessary because existing atmospheric CO2 guarantees continued warming for decades regardless of emission reductions."},
{id:63,cat:"Climate and Env",src:"Advanced",t:"f",q:"Name the specific feedback mechanism where thawing permafrost releases CO2 and methane, which causes further warming, which causes more thawing. What is the tipping point concern?",a:"The permafrost carbon feedback loop. The tipping point concern is that at approximately 2 degrees C of global warming, enough permafrost may thaw to release enough greenhouse gases to make human mitigation efforts irrelevant - the warming process would become self-sustaining regardless of human emissions reductions."},
{id:64,cat:"Climate and Env",src:"Finals",t:"f",q:"The stratospheric ozone layer absorbs which specific type of solar radiation, and at what altitude does it primarily exist?",a:"UV-B and UV-C ultraviolet radiation. The ozone layer exists in the stratosphere primarily between 15 and 35 kilometres above Earth's surface, with peak concentration around 20 to 25 km."},
{id:65,cat:"Climate and Env",src:"Finals",t:"f",q:"What is an inversion layer and what air quality problem does it create in cities surrounded by mountains?",a:"A temperature inversion occurs when warm air sits above cooler air near the surface, trapping pollutants close to the ground. In mountain-ringed cities like Los Angeles, Vancouver, or Mexico City, inversions prevent vertical mixing - industrial and vehicle emissions accumulate into dangerous smog. The condition is worsened in winter when the sun is low and unable to heat the surface sufficiently to break the inversion."},
// === ECONOMICS AND DEVELOPMENT GEOGRAPHY ===
{id:66,cat:"Economics Geo",src:"Advanced",t:"f",q:"What is the resource curse (Dutch Disease) and give a specific Canadian provincial example?",a:"The resource curse is the paradox where countries or regions with abundant natural resources often have poor economic growth, weak institutions, and conflict. Dutch Disease specifically refers to how resource export revenues cause currency appreciation, making other export industries (manufacturing) uncompetitive. In Canada: Alberta's oil wealth has historically made its manufacturing sector uncompetitive compared to Ontario, creating economic dependence on a single volatile commodity."},
{id:67,cat:"Economics Geo",src:"Advanced",t:"f",q:"Distinguish between absolute advantage and comparative advantage in international trade theory.",a:"Absolute advantage: a country can produce a good more efficiently (less inputs) than another. Comparative advantage (Ricardo): a country should specialize in goods where its opportunity cost is lowest, even if it has no absolute advantage. Comparative advantage explains why trade is mutually beneficial even when one country is more efficient at producing everything."},
{id:68,cat:"Economics Geo",src:"Advanced",t:"f",q:"What is the Human Development Index (HDI) and which three dimensions does it measure?",a:"The HDI is a composite measure developed by the UN to assess country development beyond GDP alone. It measures: (1) Life expectancy at birth (health). (2) Mean years of schooling and expected years of schooling (education). (3) Gross National Income per capita adjusted for purchasing power parity (standard of living)."},
{id:69,cat:"Economics Geo",src:"Advanced",t:"f",q:"The term BRICS has been expanded. Name the original five BRICS nations and the countries that joined in 2024.",a:"Original BRICS: Brazil, Russia, India, China, South Africa. Countries that joined in January 2024: Egypt, Ethiopia, Iran, Saudi Arabia, and the United Arab Emirates (Argentina declined after invitation). The group is now sometimes called BRICS+."},
{id:70,cat:"Economics Geo",src:"Advanced",t:"f",q:"What is the difference between a trade deficit and a current account deficit?",a:"A trade deficit occurs when a country imports more goods than it exports. A current account deficit is broader - it includes goods, services, investment income, and transfer payments. A country can have a trade deficit but a current account surplus if its service exports and investment income exceed the goods deficit."},
{id:71,cat:"Economics Geo",src:"Advanced",t:"f",q:"Explain the concept of Special Economic Zones (SEZs) and China's use of them after 1978.",a:"SEZs are designated areas where business regulations, tariffs, and labour laws differ from the rest of the country - typically to attract foreign investment and export manufacturing. China established its first four SEZs in 1980 (Shenzhen, Zhuhai, Xiamen, Shantou) under Deng Xiaoping's reform policy. Shenzhen transformed from a fishing village to a megacity of 12 million as the model's most dramatic example."},
{id:72,cat:"Economics Geo",src:"Advanced",t:"f",q:"What is the significance of the Gini coefficient of 0 versus 1, and which region of the world currently has the highest income inequality as measured by this index?",a:"Gini 0 = perfect equality. Gini 1 = perfect inequality. Sub-Saharan Africa and Latin America have the world's highest income inequality by Gini coefficient - South Africa consistently ranks among the most unequal countries globally."},
// === OCEAN AND MARINE SCIENCE ===
{id:73,cat:"Ocean Science",src:"Advanced",t:"f",q:"What is the mesopelagic zone and what ecological function do organisms living there serve in the global carbon cycle?",a:"The mesopelagic (twilight) zone extends from 200 to 1,000 metres depth where sunlight barely penetrates. Organisms there perform the biological carbon pump: they feed at the surface at night, then sink or excrete at depth during the day, transporting surface carbon to the deep ocean and sequestering it for centuries."},
{id:74,cat:"Ocean Science",src:"Advanced",t:"f",q:"Explain the difference between a warm-core ring and a cold-core ring in ocean circulation.",a:"When the Gulf Stream meanders, it pinches off rotating eddies. A warm-core ring forms when a clockwise eddy of warm subtropical water is trapped within the cold Labrador Sea to the north of the Gulf Stream. A cold-core ring forms when counterclockwise eddy circulation traps cold subpolar water south of the Gulf Stream. Each ring can persist for months and represent distinct ecological habitats."},
{id:75,cat:"Ocean Science",src:"Advanced",t:"f",q:"What is halocline, thermocline, and pycnocline, and how do they inhibit deep water mixing?",a:"A thermocline is a layer of rapid temperature decrease with depth. A halocline is a layer of rapid salinity change with depth. A pycnocline is a layer of rapid density change (caused by temperature or salinity differences). All three create stable density stratification that inhibits vertical mixing, keeping nutrients trapped below the photic zone and reducing productivity."},
{id:76,cat:"Ocean Science",src:"Advanced",t:"f",q:"The Great Pacific Garbage Patch is frequently described as a solid island of plastic. Why is this description scientifically inaccurate?",a:"It is inaccurate because the patch is a diffuse area of microplastic particles suspended at and below the ocean surface - mostly invisible fragments smaller than 5 mm. It is more accurately described as a plastic soup covering approximately 1.6 million km2. The plastic does not form a solid surface and cannot be seen from satellite imagery without specialized instrumentation."},
{id:77,cat:"Ocean Science",src:"Advanced",t:"f",q:"What is bioaccumulation and biomagnification? Give a specific Canadian Arctic food chain example.",a:"Bioaccumulation: buildup of a toxin within one organism over its lifetime. Biomagnification: increasing concentration of a toxin at each successive trophic level in a food chain. Arctic example: PCBs (polychlorinated biphenyls) enter Arctic marine food chains via zooplankton, concentrate in Arctic cod, double again in ringed seals, quadruple again in beluga whales, and reach levels in Inuit that consume beluga far above safe limits - despite the PCBs being manufactured thousands of kilometres away."},
{id:78,cat:"Ocean Science",src:"Advanced",t:"f",q:"The 1992 cod moratorium devastated Newfoundland. Thirty years later, what is the status of the Northern Cod stock and what ecological change has prevented full recovery?",a:"The Northern Cod stock remains at a small fraction of its pre-collapse abundance - approximately 5 to 10 percent of biomass needed for a sustainable commercial fishery. Full recovery has been prevented by a fundamental ecosystem shift: with cod absent for decades, shrimp and crab (formerly cod prey) exploded in population. These species now compete with juvenile cod for food, creating a stable alternative ecosystem state that resists cod recovery."},
{id:79,cat:"Ocean Science",src:"Finals",t:"f",q:"What is the exact chemical formula for the reaction that causes ocean acidification when CO2 dissolves in seawater?",a:"CO2 + H2O forms H2CO3 (carbonic acid), which then dissociates: H2CO3 forms H+ + HCO3- (bicarbonate), and HCO3- forms H+ + CO32- (carbonate ion). The release of hydrogen ions lowers pH. The reduction in carbonate ions makes it harder for organisms like corals, oysters, and pteropods to build calcium carbonate shells."},
{id:80,cat:"Ocean Science",src:"Finals",t:"f",q:"The Beaufort Gyre in the Arctic stores freshwater. Explain the mechanism and the potential consequences if it releases this water into the North Atlantic.",a:"The Beaufort Gyre is a clockwise wind-driven circulation in the Arctic Ocean that accumulates and stores a large volume of freshwater from river runoff and sea ice melt. If the winds weakening or reversing allow the gyre to release this freshwater, it would flow into the North Atlantic and reduce surface salinity. Lower salinity means lower density - reducing the sinking of water that drives the Atlantic Meridional Overturning Circulation and potentially causing a significant weakening of the current system that moderates North Atlantic climate."},
// === GEOLOGY AND EARTH SCIENCE ===
{id:81,cat:"Geology",src:"Advanced",t:"f",q:"What is the difference between intrusive (plutonic) and extrusive (volcanic) igneous rock and give one example of each found in Canada.",a:"Intrusive rock forms from magma that cools slowly deep underground - forming large crystals (e.g., the Coastal Plutonic Complex granite batholiths of BC). Extrusive rock forms from lava that cools quickly at the surface - forming fine crystals or glass (e.g., the basalt flows of the Nechako Plateau in interior BC)."},
{id:82,cat:"Geology",src:"Advanced",t:"f",q:"Describe the rock cycle in terms of the three rock types and the processes that convert between them.",a:"Igneous rock forms when magma or lava cools and solidifies. Weathering and erosion break igneous or other rocks into sediments, which compact and cement into sedimentary rock. Heat and pressure transform any rock type into metamorphic rock. Metamorphic rock can melt to form magma and restart the cycle. The cycle has no fixed starting point."},
{id:83,cat:"Geology",src:"Advanced",t:"f",q:"The Athabasca Oil Sands contain bitumen rather than conventional crude oil. What is bitumen and what process is required to make it usable?",a:"Bitumen is an extremely viscous, tar-like mixture of polycyclic aromatic hydrocarbons mixed with clay, sand, and water in a semi-solid form. To produce usable crude oil, bitumen must be either mined (surface mining for shallow deposits) or extracted via Steam-Assisted Gravity Drainage (SAGD) - injecting steam to liquefy bitumen underground - then upgraded in a refinery to remove impurities and reduce viscosity."},
{id:84,cat:"Geology",src:"Advanced",t:"f",q:"What is the Mohorovicic Discontinuity (Moho) and how was it discovered?",a:"The Moho is the boundary between Earth's crust and the mantle - at approximately 35 km depth under continents and 5 to 10 km under oceans. It was discovered in 1909 by Croatian seismologist Andrija Mohorovicic, who noticed that seismic waves from an earthquake traveled faster at greater depths, indicating they had entered a denser material (the mantle) below the crust."},
{id:85,cat:"Geology",src:"Advanced",t:"f",q:"Name the three types of plate boundaries and the primary geological feature or activity associated with each.",a:"Divergent boundary: plates move apart, forming mid-ocean ridges and rift valleys (e.g., Mid-Atlantic Ridge). Convergent boundary: plates collide, forming mountain ranges or subduction zones with volcanoes and deep trenches (e.g., Andes, Cascades). Transform boundary: plates slide horizontally past each other, forming fault lines with earthquakes but little volcanism (e.g., San Andreas Fault)."},
{id:86,cat:"Geology",src:"Advanced",t:"f",q:"What is the difference between magnitude and intensity when measuring earthquakes?",a:"Magnitude is an objective measure of the energy released at the earthquake's source - the same regardless of where you measure from (Richter scale or moment magnitude Mw). Intensity measures the local effects felt at a specific location - how much shaking, damage, and human perception occurred. Intensity decreases with distance from the epicentre. A magnitude 7.0 quake has one magnitude but different intensities across a region."},
{id:87,cat:"Geology",src:"Advanced",t:"f",q:"What is P-wave vs S-wave in seismic science, and why can't S-waves pass through Earth's outer core?",a:"P-waves (primary/compressional waves) compress and expand rock in the direction of travel - they move through solids, liquids, and gases. S-waves (secondary/shear waves) move rock perpendicular to the direction of travel - they can only move through solids. The outer core is liquid iron - S-waves cannot propagate through it, which is how seismologists first discovered that Earth's outer core is liquid."},
{id:88,cat:"Geology",src:"Precision",t:"f",q:"How old is the Earth, and what is the primary method used to determine this age?",a:"Approximately 4.54 billion years old (4.54 +/- 0.05 billion years). Determined by radiometric dating (specifically uranium-lead dating) of ancient zircon crystals from meteorites and the oldest terrestrial rocks."},
{id:89,cat:"Geology",src:"Precision",t:"f",q:"The supercontinent Pangaea began to break apart approximately how many millions of years ago, and what evidence on modern continents confirms this?",a:"Approximately 200 to 175 million years ago (beginning of the Jurassic period). Evidence: identical fossil species (Glossopteris, Mesosaurus) found on now-separated continents, matching rock formations and mountain chains across ocean basins (Appalachians match Caledonides in Scotland), and the geometric fit of continental coastlines."},
{id:90,cat:"Geology",src:"Precision",t:"f",q:"Name the geological era, period, and epoch in which we currently live.",a:"Phanerozoic Eon, Cenozoic Era, Quaternary Period, Holocene Epoch (though the Anthropocene is proposed as the most recent epoch, not yet formally ratified by the International Union of Geological Sciences as of 2024)."},
// === WORLD POLITICAL GEOGRAPHY - ADVANCED ===
{id:91,cat:"World Political",src:"Advanced",t:"f",q:"The UNCLOS framework established the concept of the Extended Continental Shelf beyond the standard EEZ. What must a country demonstrate to claim it and what are the stakes in the Arctic?",a:"A country must submit scientific evidence to the UN Commission on the Limits of the Continental Shelf (CLCS) proving that the seabed beyond 200 nautical miles is a natural prolongation of its continental shelf. In the Arctic, Canada, Russia, Denmark (via Greenland), and Norway all have competing claims over the Lomonosov and Gakkel ridges, which could include vast hydrocarbon deposits and mineral resources on the seabed."},
{id:92,cat:"World Political",src:"Advanced",t:"f",q:"Name the eight member states of the Arctic Council and explain its mandate.",a:"Canada, United States, Russia, Norway, Denmark (including Greenland and Faroe Islands), Sweden, Finland, and Iceland. The Arctic Council promotes cooperation, coordination, and interaction among Arctic states and Indigenous peoples on issues of sustainable development and environmental protection in the Arctic. It has no enforcement powers and cannot address military security."},
{id:93,cat:"World Political",src:"Advanced",t:"f",q:"What is the Schengen Area and how does it differ from European Union membership?",a:"The Schengen Area is a zone of 27 European countries that have abolished passport controls at their mutual borders, allowing free movement of people. It differs from EU membership: some EU members are not Schengen members (Ireland, Romania, Bulgaria, Cyprus) and some non-EU members are Schengen members (Norway, Iceland, Switzerland, Liechtenstein). Brexit removed the UK from both."},
{id:94,cat:"World Political",src:"Advanced",t:"f",q:"Explain the difference between sovereignty and jurisdiction, using a maritime example.",a:"Sovereignty is the supreme legal authority over a territory - no other authority can override it. Jurisdiction is the legal authority to apply laws in a specific area - it may be limited or shared. Example: in its Exclusive Economic Zone (200 nm), Canada has sovereign rights over resources (fishing, oil, gas) but NOT full sovereignty - foreign ships can transit freely. In its Territorial Sea (12 nm), Canada has sovereignty including the right to exclude ships."},
{id:95,cat:"World Political",src:"Advanced",t:"f",q:"What is the principle of uti possidetis juris and how was it applied to African decolonization?",a:"Uti possidetis juris is the international law principle that newly independent states inherit the borders of the colonial administrative units that preceded them. It was applied in Africa after decolonization: new nations kept the arbitrary borders drawn by European colonial powers at the 1884-85 Berlin Conference rather than redrawing them along ethnic or cultural lines - a decision that has contributed to many ongoing conflicts across the continent."},
{id:96,cat:"World Political",src:"Finals",t:"f",q:"What is the significance of Diego Garcia in global geopolitics?",a:"Diego Garcia is a British Indian Ocean Territory atoll that hosts a major US military base - strategically positioned to project air and naval power across the Indian Ocean, Persian Gulf, and South and Southeast Asia. It has served as a staging ground for US operations in Iraq and Afghanistan. Mauritius claims sovereignty over the archipelago (the Chagos Islands) after the UK forcibly expelled 2,000 Chagossians between 1968 and 1973. In 2024, the UK agreed to transfer sovereignty to Mauritius while retaining the base."},
{id:97,cat:"World Political",src:"Finals",t:"f",q:"The Bosporus Strait is governed by which 1936 convention, and what are its key provisions?",a:"The Montreux Convention of 1936. Key provisions: Turkey controls transit and can deny warships of non-Black Sea states during wartime. Black Sea states (Russia, Ukraine, Romania, Bulgaria, Georgia) have broader transit rights. Commercial vessels pass freely in peacetime. The convention became highly relevant during the Russia-Ukraine conflict when Turkey invoked its provisions to restrict warship passage."},
// === CANADIAN NATIONAL PARKS - DETAILED ===
{id:98,cat:"National Parks",src:"Parks",t:"f",q:"How large is Wood Buffalo National Park and what does this make it relative to world parks?",a:"Wood Buffalo is 44,807 km2 - larger than Switzerland. It is Canada's largest national park and one of the world's largest protected areas."},
{id:99,cat:"National Parks",src:"Parks",t:"f",q:"What is the Icefields Parkway and why is it considered one of the world's most scenic drives?",a:"The Icefields Parkway (Highway 93) is a 230-km mountain highway between Lake Louise and Jasper in Alberta. It passes 100 ancient glaciers, the Columbia Icefield, six mountain passes, and dozens of waterfalls, running along the spine of the Continental Divide."},
{id:100,cat:"National Parks",src:"Parks",t:"f",q:"Mingan Archipelago National Park Reserve in Quebec is famous for which specific geological formations and what process created them?",a:"Enormous limestone monoliths called flowerpot rocks - formed by differential marine erosion. Harder rock at the top resists erosion while softer limestone below is undercut by waves, creating mushroom-shaped pillars up to 8 metres tall."},
{id:101,cat:"National Parks",src:"Parks",t:"f",q:"What makes Pacific Rim National Park Reserve ecologically exceptional, and what is the West Coast Trail?",a:"Pacific Rim protects old-growth temperate rainforest - one of the rarest ecosystems on Earth. The West Coast Trail is a 75-km challenging backcountry route on Vancouver Island originally built as a lifesaving trail for shipwreck survivors along the notorious Graveyard of the Pacific."},
{id:102,cat:"National Parks",src:"Parks",t:"f",q:"Cape Breton Highlands National Park is bisected by a famous scenic road. Name it and describe what it traverses.",a:"The Cabot Trail - a 298-km route that encircles much of Cape Breton Island, traversing the highlands plateau, coastal cliffs dropping to the sea, and Acadian French villages. Named after explorer John Cabot."},
{id:103,cat:"National Parks",src:"Parks",t:"f",q:"Kluane National Park in Yukon is part of a transboundary UNESCO World Heritage Site. Name the other protected areas that form it.",a:"Kluane (Yukon), Wrangell-St. Elias National Park (Alaska), Glacier Bay National Park (Alaska), and Tatshenshini-Alsek Provincial Park (BC) together form the largest internationally protected area in the world at approximately 97,000 km2."},
{id:104,cat:"National Parks",src:"Parks",t:"f",q:"The Riding Mountain National Park in Manitoba is described as an island of wilderness. What specific ecological transition does it represent?",a:"It sits atop the Manitoba Escarpment - a plateau rising 400 m above the surrounding plains. The park contains the transition between three distinct biomes: boreal forest, aspen parkland (mixed forest), and fescue grassland, making it one of the most biodiverse parks on the Prairies."},
{id:105,cat:"National Parks",src:"Parks",t:"f",q:"La Mauricie National Park in Quebec is classic Laurentian Shield country. What traditional Indigenous use of the landscape is still celebrated there?",a:"The park is Anishinaabe territory - specifically Waban-Aki and Atikamekw lands. The connected lake and river system was historically a major canoe travel route for trade and seasonal movement. Canoe camping through interconnected lakes remains the park's signature experience."},
// === UNESCO WORLD HERITAGE - GLOBAL ===
{id:106,cat:"UNESCO",src:"Finals",t:"f",q:"What is the specific reason Chartres Cathedral in France is UNESCO-listed, beyond its architectural beauty?",a:"Chartres is listed for its nearly complete Gothic architectural ensemble dating to 1194-1220 CE, its exceptional collection of 12th and 13th-century stained glass (one of the most complete medieval programs in the world), and its role as a pilgrimage destination along the Way of St. James. It survived both World Wars intact due to the removal of its windows for safekeeping."},
{id:107,cat:"UNESCO",src:"Finals",t:"f",q:"The ancient city of Palmyra in Syria was a UNESCO World Heritage site. What happened to it in 2015 and what does it illustrate about cultural heritage in conflict?",a:"ISIS (Islamic State) captured Palmyra in May 2015 and systematically destroyed its Bel Temple, Baalshamin Temple, the Arch of Triumph, and numerous tower tombs. The head archaeologist, Khaled al-Asaad, was executed. The destruction illustrates how cultural heritage is deliberately targeted in conflict as a form of cultural genocide - erasing the identity and history of a people."},
{id:108,cat:"UNESCO",src:"Finals",t:"f",q:"The Monarch Butterfly Biosphere Reserve in Mexico is listed as UNESCO World Heritage. What specific migratory phenomenon occurs there?",a:"Up to 1 billion Monarch butterflies overwinter in Oyamel fir forests in the Michoacan and State of Mexico highlands from November to March, covering trees with such density that branches bend under their weight. The butterflies migrate up to 4,000 km from Canada and the northern US in a generational relay migration not fully understood by science."},
{id:109,cat:"UNESCO",src:"Finals",t:"f",q:"What criterion does UNESCO use to designate a Mixed World Heritage Site and name a Canadian example?",a:"A mixed site must satisfy both cultural AND natural heritage criteria simultaneously. Pimachiowin Aki (Manitoba/Ontario, designated 2018) qualifies as both a cultural landscape (living Anishinaabe relationship with the boreal environment) and a natural site (intact boreal forest, rivers, and lakes of exceptional ecological integrity)."},
{id:110,cat:"UNESCO",src:"Finals",t:"f",q:"The Wadden Sea is a UNESCO World Heritage Site shared by three European countries. Name them and explain why this tidal environment is globally important.",a:"Germany, Netherlands, and Denmark share the Wadden Sea. It is the world's largest unbroken intertidal sand and mud flat system - the primary nursery habitat for North Sea fish species, critical staging ground for millions of migratory birds on the East Atlantic Flyway, and a globally significant habitat for grey seals, harbour seals, and porpoises."},
// === BIOGEOGRAPHY AND ECOLOGY ===
{id:111,cat:"Ecology",src:"Advanced",t:"f",q:"Define the concept of an ecological niche and distinguish between fundamental niche and realized niche.",a:"An ecological niche is the full range of environmental conditions, resources, and interactions that determine where and how a species lives. The fundamental niche is the theoretical range of conditions a species could occupy without competition. The realized niche is the smaller range it actually occupies when competing species exclude it from parts of the fundamental niche."},
{id:112,cat:"Ecology",src:"Advanced",t:"f",q:"What is island biogeography theory (MacArthur and Wilson, 1967) and why is it relevant to national park design?",a:"The theory states that island species richness is determined by two opposing rates: immigration (species arriving) and extinction (species dying out), which depend on island size and distance from mainland. Larger islands closer to mainland have more species. This is directly relevant to park design: small, isolated parks function like islands - too small to sustain viable populations of large mammals, too isolated for species recolonization. Conservation planners use this to argue for large, connected protected areas."},
{id:113,cat:"Ecology",src:"Advanced",t:"f",q:"What is the difference between primary succession and secondary succession? Give a Canadian example of each.",a:"Primary succession begins on bare rock or sterile substrate with no soil or seed bank (e.g., newly exposed ground after a glacier retreats in the Canadian Rockies - beginning with lichens and mosses). Secondary succession follows disturbance where soil and seed bank remain (e.g., forest recovering after a wildfire in the boreal - aspen regenerates rapidly from root suckers within a year)."},
{id:114,cat:"Ecology",src:"Advanced",t:"f",q:"What is the competitive exclusion principle (Gause's Law) and give an example of how it works?",a:"Two species competing for exactly the same resource in the same way cannot stably coexist - one will outcompete and displace the other. Example: when grey squirrels were introduced to Britain, they outcompeted native red squirrels for acorns and hazelnuts in broadleaf forests - red squirrels now persist only in conifer-dominated areas where grey squirrels are at a dietary disadvantage."},
{id:115,cat:"Ecology",src:"Advanced",t:"f",q:"Describe the concept of a trophic cascade with a Canadian marine example.",a:"A trophic cascade occurs when a change at one trophic level propagates up or down the food chain, affecting multiple levels. Canadian marine example: In the Pacific, sea otter population recovery controls sea urchin numbers, allowing kelp forests to recover. Without otters, urchin barrens replace kelp - eliminating habitat for hundreds of associated species including juvenile fish and invertebrates important to commercial fisheries."},
{id:116,cat:"Ecology",src:"Advanced",t:"f",q:"What is edge effect in ecology and why is it both a benefit and a threat to biodiversity?",a:"Edge effect is the change in species composition and abundance at the boundary (ecotone) between two habitats. It can increase local biodiversity because edge species from both habitats are present. However, excessive habitat fragmentation creates too much edge and too little interior - species requiring interior forest habitat (many migratory songbirds, sensitive amphibians) lose their refugia, while edge-adapted generalists and invasive species dominate."},
{id:117,cat:"Ecology",src:"Advanced",t:"f",q:"What is the 30x30 conservation target and what is Canada's commitment under it?",a:"The 30x30 target (from the Kunming-Montreal Global Biodiversity Framework, 2022) commits nations to conserving 30 percent of their land and 30 percent of their oceans by 2030. Canada formally committed to this target. As of 2024, Canada had protected approximately 13 percent of land and 14 percent of ocean - requiring substantial new protected areas to meet the 2030 deadline."},
// === HUMAN MIGRATION AND URBAN GEOGRAPHY ===
{id:118,cat:"Population",src:"Advanced",t:"f",q:"Distinguish between forced migration, economic migration, and environmental migration. Give one example of each involving Canada.",a:"Forced migration: movement under threat of persecution or violence (e.g., Syrian refugees resettled in Canada 2015-2016). Economic migration: movement for employment or better economic prospects (e.g., Filipino temporary foreign workers in Alberta agriculture). Environmental migration: displacement by environmental degradation or disaster (e.g., climate evacuees from coastal First Nations in BC facing sea level rise or Arctic permafrost collapse)."},
{id:119,cat:"Population",src:"Advanced",t:"f",q:"What is the demographic dividend and which region of the world is currently positioned to benefit most from it?",a:"The demographic dividend occurs when a country's working-age population bulge is larger than dependant population (children and elderly), generating higher savings rates, consumption, and economic growth. Sub-Saharan Africa is positioned to experience this in the coming decades as its high youth population ages into the workforce - though this requires investment in education and job creation to capture the dividend."},
{id:120,cat:"Population",src:"Advanced",t:"f",q:"What is the concept of 'millennial' or 'amenity' migration, and how has it reshaped small towns in Canada?",a:"Amenity migration is the movement of higher-income people to places offering natural beauty, recreation, cultural amenities, or quality of life - not just economic opportunity. In Canada, remote work during and after COVID-19 accelerated this trend: small BC Interior towns (Revelstoke, Nelson), Ontario cottage country communities, and Atlantic Canadian rural areas experienced rapid in-migration that drove up housing costs and displaced long-term residents."},
{id:121,cat:"Population",src:"Advanced",t:"f",q:"Explain the concept of 'shrinking cities' and name one Canadian example.",a:"Shrinking cities are urban areas experiencing sustained population decline due to industrial restructuring, outmigration, or low fertility. They face fiscal stress (maintaining infrastructure for fewer taxpayers), vacant properties, neighbourhood abandonment, and governance challenges. Canadian example: Sault Ste. Marie and Thunder Bay in Ontario experienced manufacturing decline. Windsor faced significant challenges during the 2008-2009 auto sector crisis."},
{id:122,cat:"Population",src:"Advanced",t:"f",q:"What is the concept of food deserts and how does it connect geography, poverty, and health outcomes?",a:"Food deserts are areas - typically low-income urban neighborhoods or remote rural areas - with poor access to affordable, nutritious food. Residents lacking personal vehicles and distant from grocery stores rely on corner stores with limited fresh produce. This contributes to diet-related health conditions (obesity, diabetes, cardiovascular disease) concentrated in low-income communities. In Canada, remote First Nations communities face extreme food insecurity due to high shipping costs for fresh food."},
// === MAP SKILLS AND CARTOGRAPHY - ADVANCED ===
{id:123,cat:"Map Skills",src:"Advanced",t:"f",q:"What is the difference between a conformal map projection and an equal-area projection, and why can no flat map preserve both?",a:"A conformal projection preserves local angles and shapes (e.g., Mercator) but distorts area. An equal-area projection preserves the relative size of areas (e.g., Gall-Peters, Mollweide) but distorts shapes. No flat map can preserve both because projecting a sphere onto a flat surface always introduces distortion in either shape, area, distance, or direction - you can only choose which property to preserve at the expense of others."},
{id:124,cat:"Map Skills",src:"Advanced",t:"f",q:"What is a Robinson projection and why was it adopted by National Geographic in 1988?",a:"The Robinson projection is a compromise map projection - it does not perfectly preserve area, shape, or distance but minimizes distortion across all three. National Geographic adopted it because it presents a more visually balanced world map than the Mercator, which dramatically exaggerates polar regions. The Robinson was replaced by the Winkel Tripel projection by National Geographic in 1998."},
{id:125,cat:"Map Skills",src:"Advanced",t:"f",q:"What is the difference between a topographic map and a planimetric map?",a:"A topographic map shows both horizontal features (roads, buildings, rivers) AND vertical relief (elevation) using contour lines. A planimetric map shows only horizontal features in two dimensions without any elevation data. Most street maps and Google Maps are planimetric. Topographic maps are essential for terrain analysis, military operations, and outdoor navigation."},
{id:126,cat:"Map Skills",src:"Advanced",t:"f",q:"What is the rule of V's in topographic map interpretation of river valleys?",a:"When contour lines cross a stream valley, they form a V shape pointing upstream (toward higher elevation). The V always points in the direction of water flow's origin (uphill). This allows map readers to determine which direction a stream flows simply from contour line patterns without labels."},
{id:127,cat:"Map Skills",src:"Advanced",t:"f",q:"What is GPS, how does it work, and what is the minimum number of satellites required for a position fix?",a:"GPS (Global Positioning System) is a satellite-based navigation system using triangulation. A GPS receiver measures the time for signals from multiple satellites to arrive, and from the time delay calculates the distance to each satellite. A minimum of 4 satellites are needed: 3 to determine 3D position (latitude, longitude, altitude) and a 4th to correct for receiver clock error."},
// === SCIENCE AND TECHNOLOGY ===
{id:128,cat:"Science Tech",src:"Advanced",t:"f",q:"What is the electromagnetic spectrum and name five types of radiation in order of increasing wavelength.",a:"The electromagnetic spectrum is the range of all types of electromagnetic radiation, ordered by wavelength (and inversely by frequency and energy). From shortest to longest wavelength: gamma rays, X-rays, ultraviolet, visible light, infrared, microwaves, radio waves."},
{id:129,cat:"Science Tech",src:"Advanced",t:"f",q:"What is remote sensing and distinguish between active and passive remote sensing with examples.",a:"Remote sensing is the acquisition of information about Earth's surface without physical contact - using sensors on aircraft or satellites. Passive remote sensing detects naturally reflected or emitted energy (e.g., optical satellite cameras detecting reflected sunlight, thermal infrared sensors detecting heat). Active remote sensing emits its own energy and measures the return (e.g., radar/SAR, LiDAR, sonar)."},
{id:130,cat:"Science Tech",src:"Advanced",t:"f",q:"What is GIS (Geographic Information System) and name three professional fields that depend on it?",a:"GIS is a computer system for capturing, storing, checking, and displaying geographically referenced data - allowing users to visualize, question, analyze, and interpret data to understand spatial relationships, patterns, and trends. Fields that depend on it: urban planning (zoning, infrastructure), environmental management (habitat mapping, pollution tracking), public health (disease mapping, hospital location analysis)."},
{id:131,cat:"Science Tech",src:"Advanced",t:"f",q:"The RADARSAT constellation operated by Canada provides what capability, and why is it significant for Arctic sovereignty?",a:"RADARSAT satellites use Synthetic Aperture Radar (SAR) to image Earth's surface through cloud cover and darkness - critical for monitoring Canada's Arctic which is frequently cloud-covered and dark in winter. The RADARSAT Constellation Mission (three satellites, launched 2019) provides daily coverage of Canada's coastline - enabling maritime surveillance, ice monitoring, ship tracking, and environmental monitoring essential for Arctic sovereignty and Search and Rescue."},
// === CULTURAL AND SOCIAL GEOGRAPHY ===
{id:132,cat:"World Culture",src:"Advanced",t:"f",q:"What is the concept of a lingua franca and name three historical examples from different regions of the world.",a:"A lingua franca is a language systematically used between people who do not share a native language. Historical examples: Latin (medieval Europe for scholarship and church), Swahili (East African trade routes), Arabic (across Islamic world), Sanskrit (South and Southeast Asian scholarship), Tok Pisin (Papua New Guinea today)."},
{id:133,cat:"World Culture",src:"Advanced",t:"f",q:"Describe the concept of cultural landscape (as used in UNESCO designation) and give one Canadian and one global example.",a:"A cultural landscape is a geographic area whose character has been significantly shaped by human interaction with the natural environment over time - reflecting the values, traditions, and land use of the people who inhabit it. Canadian example: Pimachiowin Aki (the Anishinaabe boreal landscape). Global example: the Rice Terraces of the Philippine Cordilleras - 2,000-year-old Ifugao agricultural terraces that transformed mountain topography."},
{id:134,cat:"World Culture",src:"Advanced",t:"f",q:"What is ethnocentrism and how does it distort geographic knowledge?",a:"Ethnocentrism is the tendency to interpret and judge other cultures through the lens of one's own cultural assumptions, viewing one's own culture as superior or normal. It distorts geographic knowledge by placing certain regions at the centre of world maps (Eurocentric mapping), using culturally loaded terminology (the Third World, developing nations), and interpreting other societies' practices as inferior rather than different."},
{id:135,cat:"World Culture",src:"Advanced",t:"f",q:"The concept of Geopolitics was founded by which geographer, and what was his core theory?",a:"Halford Mackinder (British, 1904) - his Heartland Theory argued that whoever controls the Eurasian Heartland (essentially Russia and Central Asia) controls the World Island (Eurasia-Africa), and whoever controls the World Island controls the world. This influenced 20th-century US containment strategy during the Cold War."},
// === COMPARATIVE AND ODD ONE OUT ===
{id:136,cat:"Odd One Out",src:"Advanced",t:"f",q:"Which does NOT belong and why? Norwegian Sea, Labrador Sea, Beaufort Sea, Coral Sea, Bering Sea.",a:"The Coral Sea - it is a warm tropical sea in the South Pacific. All others are cold subarctic or Arctic seas bordering the world's northern regions."},
{id:137,cat:"Odd One Out",src:"Advanced",t:"f",q:"Which does NOT belong and why? Fjord, Drumlin, Esker, Moraine, Cirque.",a:"Fjord - while glacially formed, it is a coastal marine feature. All others (drumlin, esker, moraine, cirque) are terrestrial glacial landforms found inland."},
{id:138,cat:"Odd One Out",src:"Advanced",t:"f",q:"Which does NOT belong and why? Amazon, Congo, Niger, Nile, Yangtze.",a:"Yangtze - it is in Asia. All others are African or South American rivers."},
{id:139,cat:"Odd One Out",src:"Advanced",t:"f",q:"Which does NOT belong and why? Treaty 1, Treaty 7, Treaty 9, Treaty 11, Nisga'a Final Agreement.",a:"Nisga'a Final Agreement - it is a modern treaty (2000). All others are Numbered Treaties signed in the 19th or early 20th centuries."},
{id:140,cat:"Odd One Out",src:"Advanced",t:"f",q:"Which does NOT belong and why? Vaquita, Saola, Northern Hairy-Nosed Wombat, Giant Panda, Vancouver Island Marmot.",a:"Giant Panda - it was downlisted from Endangered to Vulnerable in 2016 due to conservation success. All others remain critically endangered or endangered with extremely small wild populations."},
// === INDIGENOUS PEOPLES - GLOBAL ===
{id:141,cat:"Indigenous",src:"Advanced",t:"f",q:"The Sami people of northern Europe are the Indigenous inhabitants of a region spanning four countries. Name the countries and the traditional Sami homeland.",a:"Norway, Sweden, Finland, and Russia. Their traditional homeland is called Sapmi (historically Lapland) - stretching across the northern reaches of all four countries above and below the Arctic Circle."},
{id:142,cat:"Indigenous",src:"Advanced",t:"f",q:"What is the significance of the 1975 James Bay and Northern Quebec Agreement in Canadian Indigenous history?",a:"It was Canada's first modern land claims agreement - negotiated between the Cree and Inuit of northern Quebec, the Quebec government, and Canada after the James Bay hydroelectric project was announced without consultation. It established Cree and Inuit self-government structures, land ownership categories, and compensation, becoming the template for subsequent modern treaties."},
{id:143,cat:"Indigenous",src:"Advanced",t:"f",q:"What is the Doctrine of Aboriginal Title in Canadian law, and how does it differ from reserve land?",a:"Aboriginal title is the inherent collective right of an Indigenous group to the land they have exclusively occupied since before European sovereignty - it is based on pre-existing territorial use, not a Crown grant. Reserve land is Crown land set aside for Indigenous use under the Indian Act - the Crown holds underlying title. Aboriginal title land is owned by the First Nation collectively and cannot be alienated to private parties, only to the Crown."},
{id:144,cat:"Indigenous",src:"Advanced",t:"f",q:"Name and describe the three treaty areas into which British Columbia's treaty-making history is divided.",a:"(1) Douglas Treaties (1850-1854): 14 small treaties on Vancouver Island signed by Governor James Douglas. (2) Treaty 8 (1899): covering northeastern BC along with Alberta and parts of NWT. (3) Modern Treaties under the BC Treaty Commission Process (1993-present): ongoing negotiations with hundreds of First Nations, resulting in modern treaties including the Nisga'a (2000) and several others."},
// === WORLD GEOGRAPHY - CAPITALS AND FLAGS ===
{id:145,cat:"World Political",src:"Finals",t:"f",q:"Which country has Yamoussoukro as its official capital city, though most government functions remain in a different city - and what is that city?",a:"Cote d'Ivoire (Ivory Coast). Yamoussoukro is the official political capital since 1983, but Abidjan remains the economic capital and seat of most government functions."},
{id:146,cat:"World Political",src:"Finals",t:"f",q:"Which Asian country has a capital city called Naypyidaw, built from scratch in 2006, and why was it built?",a:"Myanmar - the military junta constructed Naypyidaw in a remote central location partly for strategic reasons (harder to access for potential protesters and foreign forces), partly for feng shui and astrological reasons, and officially to better serve the country's geographic centre. It remains unusually empty despite being the official capital."},
{id:147,cat:"World Political",src:"Finals",t:"f",q:"Which three countries share the island of Hispaniola?",a:"Only two: Haiti (western third) and the Dominican Republic (eastern two-thirds). This is a common trap - the question is designed to test whether you know Hispaniola has only two, not three nations."},
{id:148,cat:"World Political",src:"Finals",t:"f",q:"What is the capital of Sri Lanka and how does it differ from the largest city?",a:"Sri Jayawardenepura Kotte is the official legislative capital. Colombo is the largest city and commercial capital. This is another country with a split capital arrangement."},
{id:149,cat:"World Political",src:"Finals",t:"f",q:"Which Pacific island nation is at risk of becoming the first country to purchase land in another country to relocate its entire population due to sea level rise?",a:"Kiribati (pronounced 'Kiribas') - the I-Kiribati government purchased land in Fiji in 2014 as a potential relocation site as rising seas threaten to make their low-lying atolls uninhabitable within decades."},
{id:150,cat:"World Political",src:"Finals",t:"f",q:"Why is Nauru geopolitically significant despite being the world's smallest island nation?",a:"At 21 km2, Nauru is the world's smallest island republic and the world's third-smallest country. It has historical significance as the site of one of the world's richest phosphate deposits (now largely exhausted), which made it briefly the wealthiest country per capita in the 1970s. It later controversially operated an Australian offshore refugee processing centre as its primary income source."},
// === RIVERS, LAKES AND WATER SYSTEMS ===
{id:151,cat:"Physical Geo",src:"Advanced",t:"f",q:"Name the world's longest river and explain why there is still scientific debate about this.",a:"The Nile is traditionally listed as the world's longest river at approximately 6,650 km. However, some measurements of the Amazon with recently mapped headwaters suggest it may be longer at approximately 6,992 km depending on which headwater source is included. The debate hinges on how the source of each river is defined - there is no universally accepted methodology."},
{id:152,cat:"Physical Geo",src:"Advanced",t:"f",q:"What is an endorheic basin and name two globally significant examples?",a:"An endorheic (or closed) basin is a watershed with no outflow to the ocean - water collects in an inland lake or evaporates. Examples: (1) The Caspian Sea basin (fed by the Volga River). (2) The Great Basin of the American West (including the Great Salt Lake). (3) The Aral Sea basin (fed by the Amu Darya and Syr Darya)."},
