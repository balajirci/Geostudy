<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CGC Finals Prep — Written Test & Jeopardy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #162236;
    --navy-light: #1e3352;
    --blue: #2563eb;
    --blue-bright: #3b82f6;
    --gold: #f59e0b;
    --gold-light: #fcd34d;
    --red: #ef4444;
    --green: #22c55e;
    --text: #e8edf5;
    --text-dim: #8fa3bb;
    --text-muted: #506070;
    --border: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.07);
    --radius: 12px;
    --radius-lg: 18px;
    --font-heading: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(37,99,235,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  #root {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* ─── Typography ─── */
  h1 { font-family: var(--font-heading); font-size: 2.2rem; font-weight: 400; line-height: 1.15; }
  h2 { font-family: var(--font-heading); font-size: 1.6rem; font-weight: 400; }
  h3 { font-size: 1rem; font-weight: 600; }

  /* ─── API key bar ─── */
  #api-bar {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .75rem 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  #api-bar label { font-size: 12px; color: var(--text-dim); white-space: nowrap; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
  #api-key-input {
    flex: 1; min-width: 220px;
    background: rgba(0,0,0,.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    outline: none;
  }
  #api-key-input:focus { border-color: var(--blue-bright); }
  #api-status { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  #api-status.ok { color: var(--green); }
  #api-status.err { color: var(--red); }

  /* ─── Cards ─── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    transition: background .15s, border-color .15s;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.15); }

  /* ─── Buttons ─── */
  button {
    font-family: var(--font-body);
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity .1s, transform .08s;
  }
  button:active { transform: scale(.98); }
  button:disabled { opacity: .45; cursor: default; }

  .btn-primary {
    background: var(--blue);
    color: #fff;
    padding: 11px 24px;
    font-weight: 500;
    font-size: 15px;
  }
  .btn-primary:hover:not(:disabled) { background: var(--blue-bright); }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    padding: 8px 14px;
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .btn-gold {
    background: var(--gold);
    color: #000;
    padding: 11px 24px;
    font-weight: 600;
    font-size: 15px;
  }
  .btn-gold:hover:not(:disabled) { background: var(--gold-light); }
  .btn-success {
    background: rgba(34,197,94,.15);
    border: 1px solid rgba(34,197,94,.3);
    color: var(--green);
    padding: 10px 18px;
    font-size: 14px;
    text-align: left;
    width: 100%;
  }
  .btn-success:hover { background: rgba(34,197,94,.22); }
  .btn-danger {
    background: rgba(239,68,68,.12);
    border: 1px solid rgba(239,68,68,.25);
    color: var(--red);
    padding: 10px 18px;
    font-size: 14px;
    text-align: left;
    width: 100%;
  }
  .btn-danger:hover { background: rgba(239,68,68,.2); }
  .btn-back {
    background: transparent;
    color: var(--text-dim);
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }
  .btn-back:hover { color: var(--text); }

  /* ─── Form controls ─── */
  select, input[type="text"] {
    background: rgba(0,0,0,.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    width: 100%;
  }
  select:focus, input[type="text"]:focus { border-color: var(--blue-bright); }
  select option { background: var(--navy-mid); }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--navy-light);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--blue-bright);
    cursor: pointer;
  }

  input[type="checkbox"] {
    accent-color: var(--blue-bright);
    width: 14px; height: 14px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ─── Progress bar ─── */
  .progress-track {
    height: 3px;
    background: var(--navy-light);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--blue-bright);
    transition: width .35s ease;
  }

  /* ─── Spinner ─── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 30px; height: 30px;
    border: 2px solid var(--navy-light);
    border-top-color: var(--blue-bright);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    display: inline-block;
  }

  /* ─── Option buttons (Written quiz) ─── */
  .opt-btn {
    width: 100%;
    text-align: left;
    padding: 13px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
    cursor: pointer;
    transition: background .1s, border-color .1s;
    font-family: var(--font-body);
  }
  .opt-btn:not(:disabled):hover { background: var(--card-hover); border-color: rgba(255,255,255,0.18); }
  .opt-btn.correct { background: rgba(34,197,94,.14); border-color: rgba(34,197,94,.4); color: var(--green); }
  .opt-btn.wrong   { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.35); color: var(--red); }
  .opt-btn.neutral { opacity: .45; }
  .opt-btn:disabled { cursor: default; }

  /* ─── Jeopardy board ─── */
  .j-board { width: 100%; border-collapse: collapse; }
  .j-board th {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    padding: 10px 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.35;
    height: 58px;
    vertical-align: middle;
  }
  .j-board td {
    border: 1px solid var(--border);
    height: 62px;
    text-align: center;
    vertical-align: middle;
    padding: 4px;
  }
  .j-cell-btn {
    width: 100%; height: 100%;
    background: none;
    border: none;
    color: var(--gold);
    font-size: 20px;
    font-weight: 700;
    font-family: var(--font-heading);
    cursor: pointer;
    border-radius: 6px;
    transition: background .12s;
    letter-spacing: -.02em;
  }
  .j-cell-btn:hover { background: rgba(245,158,11,.1); }
  .j-cell-played { color: var(--text-muted); opacity: .25; font-size: 18px; font-weight: 700; font-family: var(--font-heading); }

  /* ─── Modal ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-box {
    background: var(--navy-mid);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius-lg);
    padding: 2rem;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }

  /* ─── Scoreboard ─── */
  .score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .85rem 1.1rem;
    text-align: center;
    min-width: 120px;
  }
  .score-name { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .score-val  { font-family: var(--font-heading); font-size: 1.6rem; }

  /* ─── Timer ─── */
  .timer-num { font-family: var(--font-heading); font-size: 2.4rem; line-height: 1; }

  /* ─── Tag pill ─── */
  .tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: rgba(37,99,235,.18);
    color: var(--blue-bright);
    border: 1px solid rgba(59,130,246,.25);
  }

  /* ─── Divider ─── */
  hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  /* ─── Explanation box ─── */
  .explain-box {
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }

  /* ─── Result circle ─── */
  .result-circle {
    width: 110px; height: 110px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    border: 3px solid var(--blue);
    background: rgba(37,99,235,.08);
  }
  .result-pct { font-family: var(--font-heading); font-size: 2rem; line-height: 1; }
  .result-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* ─── Review items ─── */
  .review-item {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 1.1rem;
  }
  .review-q { padding: 1rem 1.25rem; background: var(--card); display: flex; gap: 12px; align-items: flex-start; }
  .review-num {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
  }
  .review-ans { padding: 1rem 1.25rem; background: rgba(0,0,0,.2); }

  /* ─── Topic bar ─── */
  .topic-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .topic-name { font-size: 13px; color: var(--text-dim); min-width: 180px; flex-shrink: 0; }
  .topic-bar-track { flex: 1; height: 5px; background: var(--navy-light); border-radius: 3px; overflow: hidden; }
  .topic-bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .topic-score { font-size: 13px; font-weight: 500; min-width: 36px; text-align: right; }

  /* ─── Utilities ─── */
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .gap-8  { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .gap-20 { gap: 20px; }
  .mt-1   { margin-top: .5rem; }
  .mt-2   { margin-top: 1rem; }
  .mt-3   { margin-top: 1.5rem; }
  .mt-4   { margin-top: 2rem; }
  .mb-1   { margin-bottom: .5rem; }
  .mb-2   { margin-bottom: 1rem; }
  .mb-3   { margin-bottom: 1.5rem; }
  .mb-4   { margin-bottom: 2rem; }
  .w100   { width: 100%; }
  .dim    { color: var(--text-dim); }
  .muted  { color: var(--text-muted); }
  .small  { font-size: 13px; }
  .xsmall { font-size: 11px; }
  .center { text-align: center; }
  .bold   { font-weight: 600; }
  .grid2  { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid3  { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }

  @media (max-width: 600px) {
    h1 { font-size: 1.7rem; }
    .grid2 { grid-template-columns: 1fr; }
    .j-cell-btn { font-size: 15px; }
    .j-board th { font-size: 8px; padding: 6px 3px; }
    .j-board td  { height: 50px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-root"></div>

<script>
/* ═══════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════ */
const API_URL = 'https://api.anthropic.com/v1/messages';
const MODEL   = 'claude-sonnet-4-6';

const ALL_CATS = [
  'Canadian Physical Geography',
  'World Countries & Capitals',
  'Rivers, Lakes & Oceans',
  'Climate Zones & Biomes',
  'Human & Population Geography',
  'Environmental Issues & Sustainability',
  'Cartography & Map Skills',
  'Economic Geography',
  'Political Geography & Borders',
  'Natural Disasters & Hazards',
  'Oceans & Marine Science',
  'Indigenous Lands & Cultures'
];

const WRITTEN_TOPICS = [
  'Mixed — All Topics',
  'Canadian Geography (provinces, territories, rivers, landforms, resources, cities)',
  'World Physical Geography (mountains, rivers, deserts, biomes, oceans)',
  'Human & Population Geography',
  'Environmental Geography & Climate Change',
  'Geographic Concepts, Maps & GIS',
  'Political & Economic Geography'
];

const JEOPARDY_PTS = [200, 400, 600, 800, 1000];

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let apiKey = localStorage.getItem('cgc_api_key') || '';

const S = {
  screen: 'home',
  // Written
  writtenTopic: 'Mixed — All Topics',
  writtenCount: 20,
  questions: [],
  currentQ: 0,
  userAnswers: [],
  writtenLoading: false,
  // Jeopardy
  numPlayers: 1,
  playerNames: ['Solo', 'Player 2', 'Player 3'],
  scores: [0, 0, 0],
  board: [],          // [{category, questions:[{points,clue,answer,explanation}]}]
  boardLoading: false,
  answered: new Set(),
  lastCats: [],
  // Modal
  activeQ: null,
  timerInterval: null,
  timeLeft: 30
};

/* ═══════════════════════════════════════════════════════
   API
═══════════════════════════════════════════════════════ */
async function callClaude(system, user, maxTokens = 2000) {
  if (!apiKey) throw new Error('No API key — please enter your Anthropic key above.');
  const resp = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: maxTokens,
      system,
      messages: [{ role: 'user', content: user }]
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  return data.content[0].text;
}

function parseJSON(text) {
  const clean = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  return JSON.parse(clean);
}

/* ─── Generate Written Test questions — batched to avoid truncation ─── */
async function genWrittenQuestions(topic, count) {
  const sys = `You are an expert geography educator producing questions for the Canadian Geographic Challenge National Finals — a prestigious competition for the top 5 Grade 8 geography students across Canada. Questions must be rigorous, factually accurate, and verifiably correct. Return ONLY a valid JSON array — no markdown fences, no preamble, no trailing text.`;

  function makePrompt(batchCount, startIdx) {
    return `Topic: "${topic}"
Generate exactly ${batchCount} multiple-choice questions (numbered ${startIdx+1}–${startIdx+batchCount}) at national championship difficulty.

Rules:
- At least 30% Canadian content if topic is mixed
- Include: specific geographic facts, geographic reasoning, data-interpretation scenarios, map-reading concepts, environmental/economic issues
- Wrong options must be plausible — not obviously wrong
- Vary correct answer index (0=A,1=B,2=C,3=D) — do NOT cluster at position 0
- Keep each explanation to 2 sentences maximum to stay concise

Return a JSON array of exactly ${batchCount} objects:
[{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0,"explanation":"2-sentence max.","topic_tag":"Canadian Geography|World Geography|Human Geography|Environmental Geography|Concepts & Map Skills|Economic & Political Geography"},...]`;
  }

  // Split into batches of max 10 to avoid token truncation
  const BATCH = 10;
  const batches = [];
  for (let i = 0; i < count; i += BATCH) {
    batches.push({ size: Math.min(BATCH, count - i), start: i });
  }

  const results = await Promise.all(batches.map(async b => {
    const raw = await callClaude(sys, makePrompt(b.size, b.start), 6000);
    return parseJSON(raw);
  }));

  return results.flat();
}

/* ─── Generate Jeopardy category ─── */
async function genJeopardyCategory(category) {
  const sys = `You are an expert geography educator producing Jeopardy-style clues for the Canadian Geographic Challenge National Finals — live competition among Canada's top 5 Grade 8 geography students. Clues must be factually precise and verifiable. Difficulty scales with dollar value. Return ONLY valid JSON.`;

  const prompt = `Category: "${category}"
Generate exactly 5 Jeopardy clues for $200, $400, $600, $800, $1000.
- Each clue is a declarative statement (Jeopardy style); the answer begins with "What is" or "Who is"
- $200: foundational knowledge any strong geography student knows
- $400: requires solid study
- $600: specific and nuanced — requires deep knowledge
- $800: highly specific geographic detail, atypical facts
- $1000: extremely challenging, edge-of-curriculum, or requires synthesis

Return JSON array of 5:
[{
  "points": 200,
  "clue": "Clue text here.",
  "answer": "What is ...?",
  "explanation": "1–2 sentences of precise geographic context confirming the answer."
}, ...]`;

  const raw = await callClaude(sys, prompt, 1800);
  return parseJSON(raw);
}

/* ═══════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════ */
function goTo(screen) {
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
  S.screen = screen;
  render();
  window.scrollTo(0, 0);
}

/* ═══════════════════════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════════════════════ */
function render() {
  const screens = {
    home:             renderHome,
    'w-setup':        renderWrittenSetup,
    'w-quiz':         renderWrittenQuiz,
    'w-results':      renderWrittenResults,
    'w-review':       renderWrittenReview,
    'j-setup':        renderJeopardySetup,
    'j-board':        renderJeopardyBoard
  };
  document.getElementById('root').innerHTML = renderApiBar() + (screens[S.screen] || renderHome)();
}

function renderApiBar() {
  const saved = !!localStorage.getItem('cgc_api_key');
  return `
<div id="api-bar">
  <label for="api-key-input">🔑 Anthropic API Key</label>
  <input
    id="api-key-input"
    type="password"
    placeholder="sk-ant-api03-..."
    value="${apiKey}"
    autocomplete="off"
    oninput="onApiKeyChange(this.value)"
  />
  <span id="api-status" class="${apiKey ? 'ok' : ''}">${apiKey ? '● Key loaded' : '● Not set'}</span>
</div>`;
}

function onApiKeyChange(val) {
  apiKey = val.trim();
  localStorage.setItem('cgc_api_key', apiKey);
  const el = document.getElementById('api-status');
  if (el) {
    el.className = apiKey ? 'ok' : 'err';
    el.textContent = apiKey ? '● Key loaded' : '● Not set';
  }
}

/* ═══════════════════════════════════════════════════════
   HOME
═══════════════════════════════════════════════════════ */
function renderHome() {
  return `
<div style="padding-top:.5rem;">
  <p class="xsmall dim" style="text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem;">Canadian Geographic Challenge — National Finals</p>
  <h1 style="margin-bottom:.6rem;">Finals Prep<br><em style="color:var(--gold);">Written Test & Jeopardy</em></h1>
  <p class="dim mb-4" style="max-width:520px;font-size:15px;">AI-generated questions at national championship difficulty. Fresh, unique content every session. Enter your Anthropic API key above to begin.</p>

  <div class="grid2 mb-4">
    <div class="card clickable" onclick="goTo('w-setup')">
      <div style="font-size:28px;margin-bottom:.85rem;">📄</div>
      <h3 style="margin-bottom:.5rem;">Written Test</h3>
      <p class="dim small mb-3" style="line-height:1.6;">Multiple choice — critical thinking, data interpretation, map skills, Canadian content. Up to 30 questions, any topic focus.</p>
      <div style="font-size:13px;color:var(--blue-bright);font-weight:500;">Start practice →</div>
    </div>
    <div class="card clickable" onclick="goTo('j-setup')">
      <div style="font-size:28px;margin-bottom:.85rem;">🏆</div>
      <h3 style="margin-bottom:.5rem;">Jeopardy Final Round</h3>
      <p class="dim small mb-3" style="line-height:1.6;">Live board simulation. Up to 3 players. 30-second buzzer timer. 6 categories × $200–$1,000. Exactly like June 1st.</p>
      <div style="font-size:13px;color:var(--gold);font-weight:500;">Build board →</div>
    </div>
  </div>

  <div class="card" style="border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.05);">
    <p class="small" style="line-height:1.65;">
      <span style="color:var(--gold);font-weight:600;">📅 Final Round — Monday June 1, 10:00 AM</span><br>
      <span class="dim">Royal Canadian Geographical Society · 50 Sussex Drive, Ottawa · Top 5 finalists compete live · Recorded for YouTube</span>
    </p>
  </div>
</div>`;
}

/* ═══════════════════════════════════════════════════════
   WRITTEN SETUP
═══════════════════════════════════════════════════════ */
function renderWrittenSetup() {
  return `
<div style="max-width:480px;">
  <div class="flex-center gap-12 mb-4">
    <button class="btn-back" onclick="goTo('home')">← Back</button>
    <h2 style="font-size:1.3rem;">Written Test Practice</h2>
  </div>

  <div class="mb-3">
    <label class="xsmall dim bold" style="display:block;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">Topic Focus</label>
    <select onchange="S.writtenTopic=this.value">
      ${WRITTEN_TOPICS.map(t => `<option value="${t}"${t===S.writtenTopic?' selected':''}>${t}</option>`).join('')}
    </select>
  </div>

  <div class="mb-4">
    <label class="xsmall dim bold" style="display:block;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">
      Number of Questions: <span id="qcount" style="color:var(--blue-bright);">${S.writtenCount}</span>
    </label>
    <input type="range" min="5" max="30" step="5" value="${S.writtenCount}"
      oninput="S.writtenCount=+this.value;document.getElementById('qcount').textContent=this.value" />
    <div class="flex-between mt-1" style="font-size:11px;color:var(--text-muted);">
      <span>5</span><span>10</span><span>15</span><span>20</span><span>25</span><span>30</span>
    </div>
  </div>

  <button class="btn-primary w100" onclick="doStartWritten()">Generate ${S.writtenCount} Questions ↗</button>
  <p class="xsmall muted center mt-2">AI-generated at national finals difficulty — unique every session</p>
</div>`;
}

async function doStartWritten() {
  if (!apiKey) { alert('Please enter your Anthropic API key first.'); return; }
  S.writtenLoading = true;
  S.questions = [];
  S.currentQ = 0;
  S.userAnswers = [];
  goTo('w-quiz');
  try {
    S.questions = await genWrittenQuestions(S.writtenTopic, S.writtenCount);
    S.writtenLoading = false;
    render();
  } catch (e) {
    S.writtenLoading = false;
    alert('Error generating questions:\n' + e.message);
    goTo('w-setup');
  }
}

/* ═══════════════════════════════════════════════════════
   WRITTEN QUIZ
═══════════════════════════════════════════════════════ */
function renderWrittenQuiz() {
  if (S.writtenLoading) return `
<div class="center" style="padding:5rem 0;">
  <div class="spinner" style="margin:0 auto 1.5rem;"></div>
  <h3 style="margin-bottom:.5rem;">Generating ${S.writtenCount} Questions…</h3>
  <p class="dim small">Setting national finals difficulty — this may take 15–25 seconds</p>
</div>`;

  if (!S.questions.length) return renderWrittenSetup();

  const q       = S.questions[S.currentQ];
  const answered = S.userAnswers[S.currentQ] !== undefined;
  const chosen   = S.userAnswers[S.currentQ];
  const correct  = S.userAnswers.filter((a, i) => a === S.questions[i].correct).length;
  const prog     = Math.round(((S.currentQ + (answered ? 1 : 0)) / S.questions.length) * 100);
  const isLast   = S.currentQ === S.questions.length - 1;

  return `
<div style="max-width:640px;">
  <div class="flex-between mb-3">
    <button class="btn-back" onclick="if(confirm('Exit and lose progress?'))goTo('w-setup')">← Exit</button>
    <span class="small dim">Q${S.currentQ+1} / ${S.questions.length}${q.topic_tag ? ' · ' + q.topic_tag : ''}</span>
    <span class="small bold">${correct} correct</span>
  </div>

  <div class="progress-track mb-4">
    <div class="progress-fill" style="width:${prog}%;"></div>
  </div>

  <div class="card mb-3" style="border-color:rgba(255,255,255,.1);">
    <p style="font-size:16px;line-height:1.75;font-weight:500;">${q.question}</p>
  </div>

  <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:1.25rem;">
    ${q.options.map((opt, i) => {
      let cls = 'opt-btn';
      if (answered) {
        if (i === q.correct) cls += ' correct';
        else if (i === chosen && chosen !== q.correct) cls += ' wrong';
        else cls += ' neutral';
      }
      return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="doAnswer(${i})">${opt}</button>`;
    }).join('')}
  </div>

  ${answered ? `
  <div class="explain-box mb-3">
    <p class="xsmall dim bold" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;">Explanation</p>
    <p class="small dim" style="line-height:1.7;">${q.explanation}</p>
  </div>
  <button class="btn-primary w100" onclick="${isLast ? "goTo('w-results')" : 'doNextQ()'}">
    ${isLast ? 'See Results →' : 'Next Question →'}
  </button>` : ''}
</div>`;
}

function doAnswer(idx) {
  S.userAnswers[S.currentQ] = idx;
  render();
}
function doNextQ() {
  if (S.currentQ < S.questions.length - 1) { S.currentQ++; render(); }
}

/* ═══════════════════════════════════════════════════════
   WRITTEN RESULTS
═══════════════════════════════════════════════════════ */
function renderWrittenResults() {
  const correct = S.userAnswers.filter((a, i) => a === S.questions[i].correct).length;
  const pct     = Math.round(correct / S.questions.length * 100);
  const grade   = pct >= 90 ? 'Exceptional' : pct >= 75 ? 'Strong' : pct >= 60 ? 'Solid' : pct >= 45 ? 'Developing' : 'Needs Focus';
  const gradeColor = pct >= 75 ? 'var(--green)' : pct >= 55 ? 'var(--gold)' : 'var(--red)';

  // Topic breakdown
  const topicMap = {};
  S.questions.forEach((q, i) => {
    const t = q.topic_tag || 'General';
    if (!topicMap[t]) topicMap[t] = { c: 0, n: 0 };
    topicMap[t].n++;
    if (S.userAnswers[i] === q.correct) topicMap[t].c++;
  });

  return `
<div style="max-width:540px;">
  <div class="flex-center gap-12 mb-4">
    <button class="btn-back" onclick="goTo('w-setup')">← New Test</button>
    <h2 style="font-size:1.3rem;">Test Results</h2>
  </div>

  <div class="result-circle" style="border-color:${gradeColor};">
    <div class="result-pct">${pct}%</div>
    <div class="result-label">${grade}</div>
  </div>
  <p class="center mb-4 dim small">${correct} correct out of ${S.questions.length}</p>

  <p class="xsmall dim bold mb-2" style="text-transform:uppercase;letter-spacing:.07em;">Performance by Topic</p>
  ${Object.entries(topicMap).map(([tag, d]) => {
    const p = Math.round(d.c / d.n * 100);
    const c = p >= 75 ? 'var(--green)' : p >= 50 ? 'var(--gold)' : 'var(--red)';
    return `
    <div class="topic-row">
      <div class="topic-name small">${tag}</div>
      <div class="topic-bar-track"><div class="topic-bar-fill" style="width:${p}%;background:${c};"></div></div>
      <div class="topic-score" style="color:${c};">${d.c}/${d.n}</div>
    </div>`;
  }).join('')}

  <div class="flex gap-12 mt-4">
    <button class="btn-ghost" style="flex:1;padding:11px;" onclick="doReview()">Review Answers</button>
    <button class="btn-primary" style="flex:1;" onclick="goTo('w-setup')">New Test ↗</button>
  </div>
</div>`;
}

function doReview() { goTo('w-review'); }

/* ═══════════════════════════════════════════════════════
   WRITTEN REVIEW
═══════════════════════════════════════════════════════ */
function renderWrittenReview() {
  return `
<div style="max-width:660px;">
  <div class="flex-center gap-12 mb-4">
    <button class="btn-back" onclick="goTo('w-results')">← Results</button>
    <h2 style="font-size:1.3rem;">Full Answer Review</h2>
  </div>

  ${S.questions.map((q, i) => {
    const ok = S.userAnswers[i] === q.correct;
    const bgNum = ok ? 'rgba(34,197,94,.2)' : 'rgba(239,68,68,.18)';
    const colNum = ok ? 'var(--green)' : 'var(--red)';
    return `
    <div class="review-item">
      <div class="review-q">
        <div class="review-num" style="background:${bgNum};color:${colNum};">${i+1}</div>
        <p class="small" style="line-height:1.7;">${q.question}</p>
      </div>
      <div class="review-ans">
        <p class="small" style="color:var(--green);margin-bottom:${!ok?'5px':'0'};">✓ ${q.options[q.correct]}</p>
        ${S.userAnswers[i] !== undefined && !ok ? `<p class="small" style="color:var(--red);margin-bottom:8px;">✗ ${q.options[S.userAnswers[i]]}</p>` : ''}
        <p class="small dim" style="line-height:1.65;margin-top:6px;">${q.explanation}</p>
      </div>
    </div>`;
  }).join('')}

  <button class="btn-primary w100 mt-2 mb-4" onclick="goTo('w-setup')">New Test ↗</button>
</div>`;
}

/* ═══════════════════════════════════════════════════════
   JEOPARDY SETUP
═══════════════════════════════════════════════════════ */
function renderJeopardySetup() {
  return `
<div style="max-width:560px;">
  <div class="flex-center gap-12 mb-4">
    <button class="btn-back" onclick="goTo('home')">← Back</button>
    <h2 style="font-size:1.3rem;">Jeopardy Final Round</h2>
  </div>

  <div class="mb-3">
    <label class="xsmall dim bold" style="display:block;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">Players</label>
    <div class="grid3">
      ${[1,2,3].map(n => `
      <button onclick="S.numPlayers=${n};render()"
        style="padding:10px;border-radius:8px;border:1px solid ${S.numPlayers===n?'var(--blue-bright)':'var(--border)'};background:${S.numPlayers===n?'rgba(59,130,246,.15)':'transparent'};color:${S.numPlayers===n?'var(--blue-bright)':'var(--text-dim)'};font-size:14px;">
        ${n} Player${n>1?'s':''}
      </button>`).join('')}
    </div>
  </div>

  ${S.numPlayers > 1 ? Array.from({length: S.numPlayers}, (_, i) => `
  <div class="mb-2">
    <label class="xsmall dim bold" style="display:block;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">Player ${i+1} Name</label>
    <input type="text" value="${S.playerNames[i]}" oninput="S.playerNames[${i}]=this.value" />
  </div>`).join('') : ''}

  <div class="mb-4" style="margin-top:${S.numPlayers>1?'1.5rem':'0'}">
    <label class="xsmall dim bold" style="display:block;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">Categories</label>
    <p class="xsmall dim mb-2" style="line-height:1.5;">Check exactly 6 to lock them in, or leave all unchecked for 6 random categories.</p>
    <div class="grid2">
      ${ALL_CATS.map((cat, i) => `
      <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;color:var(--text-dim);line-height:1.4;">
        <input type="checkbox" class="j-cat-check" value="${cat}" style="margin-top:2px;" />
        ${cat}
      </label>`).join('')}
    </div>
  </div>

  <button class="btn-gold w100" onclick="doStartJeopardy()">Generate Board ↗</button>
  <p class="xsmall muted center mt-2">30 AI-generated clues across 6 categories · national finals difficulty</p>
</div>`;
}

async function doStartJeopardy() {
  if (!apiKey) { alert('Please enter your Anthropic API key first.'); return; }
  const checked = [...document.querySelectorAll('.j-cat-check:checked')].map(c => c.value);
  let cats;
  if (checked.length >= 6) {
    cats = checked.slice(0, 6);
  } else {
    const rest = ALL_CATS.filter(c => !checked.includes(c)).sort(() => Math.random() - .5);
    cats = [...checked, ...rest].slice(0, 6);
  }
  S.lastCats = cats;
  await buildJeopardyBoard(cats);
}

async function buildJeopardyBoard(cats) {
  S.board = cats.map(cat => ({ category: cat, questions: null }));
  S.scores = [0, 0, 0];
  S.answered = new Set();
  S.boardLoading = true;
  goTo('j-board');

  let loaded = 0;
  const updateProgress = () => {
    loaded++;
    const el = document.getElementById('load-text');
    const bar = document.getElementById('load-bar');
    if (el)  el.textContent = `${loaded} of ${cats.length} categories ready…`;
    if (bar) bar.style.width = Math.round(loaded / cats.length * 100) + '%';
  };

  await Promise.all(cats.map(async (cat, i) => {
    try {
      S.board[i].questions = await genJeopardyCategory(cat);
    } catch (e) {
      S.board[i].questions = JEOPARDY_PTS.map(pt => ({
        points: pt,
        clue: `[${cat} · $${pt} — failed to load. Try regenerating.]`,
        answer: 'N/A',
        explanation: ''
      }));
    }
    updateProgress();
  }));

  S.boardLoading = false;
  render();
}

/* ═══════════════════════════════════════════════════════
   JEOPARDY BOARD
═══════════════════════════════════════════════════════ */
function renderJeopardyBoard() {
  const loadedCount = S.board.filter(c => c.questions).length;
  const totalCats   = S.board.length || 6;

  if (S.boardLoading && loadedCount < totalCats) {
    return `
<div class="center" style="padding:5rem 0;">
  <div class="spinner" style="margin:0 auto 1.5rem;"></div>
  <h3 style="margin-bottom:.75rem;">Building Jeopardy Board…</h3>
  <p class="dim small mb-3" id="load-text">${loadedCount} of ${totalCats} categories ready…</p>
  <div class="progress-track" style="max-width:220px;margin:0 auto;">
    <div class="progress-fill" id="load-bar" style="background:var(--gold);width:${Math.round(loadedCount/totalCats*100)}%;"></div>
  </div>
</div>`;
  }

  const allAnswered = S.answered.size === S.board.length * 5;

  return `
<div>
  <!-- Scoreboard -->
  <div class="flex-between mb-3" style="flex-wrap:wrap;gap:10px;">
    <button class="btn-back" onclick="if(confirm('Leave this board?'))goTo('j-setup')">← Setup</button>
    <div class="flex gap-12" style="flex-wrap:wrap;">
      ${S.playerNames.slice(0, S.numPlayers).map((name, i) => `
      <div class="score-card">
        <div class="score-name">${name}</div>
        <div class="score-val" style="color:${S.scores[i]>=0?'var(--text)':'var(--red)'};">
          ${S.scores[i]<0?'−$':'$'}${Math.abs(S.scores[i]).toLocaleString()}
        </div>
      </div>`).join('')}
    </div>
    <div class="small dim">${S.answered.size}/${S.board.length*5} played</div>
  </div>

  <!-- Board -->
  <div style="overflow-x:auto;margin-bottom:1.5rem;">
    <table class="j-board">
      <thead>
        <tr>${S.board.map(c => `<th>${c.category}</th>`).join('')}</tr>
      </thead>
      <tbody>
        ${JEOPARDY_PTS.map((pt, pi) => `
        <tr>${S.board.map((cat, ci) => {
          const key  = `${ci}-${pi}`;
          const done = S.answered.has(key);
          const rdy  = !!cat.questions;
          return `<td>
            ${!rdy
              ? `<span class="muted xsmall">…</span>`
              : done
              ? `<span class="j-cell-played">$${pt}</span>`
              : `<button class="j-cell-btn" onclick="openJeopardyQ(${ci},${pi})">$${pt}</button>`
            }
          </td>`;
        }).join('')}</tr>`).join('')}
      </tbody>
    </table>
  </div>

  ${allAnswered ? renderBoardComplete() : ''}
</div>`;
}

function renderBoardComplete() {
  const sorted = S.playerNames.slice(0, S.numPlayers)
    .map((n, i) => ({ n, s: S.scores[i] }))
    .sort((a, b) => b.s - a.s);
  const medals = ['🥇', '🥈', '🥉'];
  return `
<div class="card center" style="border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.05);">
  <p style="font-size:16px;font-weight:600;margin-bottom:1.25rem;">Board Complete!</p>
  ${S.numPlayers > 1 ? `
  <div class="flex gap-12 mb-4" style="justify-content:center;flex-wrap:wrap;">
    ${sorted.map((p, rank) => `
    <div class="score-card" style="min-width:130px;">
      <div class="score-name">${medals[rank]} ${rank===0?'Winner':rank===1?'2nd':'3rd'}</div>
      <div style="font-size:15px;font-weight:600;margin:.35rem 0;">${p.n}</div>
      <div class="score-val" style="color:${p.s>=0?'var(--gold)':'var(--red)'};">
        ${p.s<0?'−$':'$'}${Math.abs(p.s).toLocaleString()}
      </div>
    </div>`).join('')}
  </div>` : `
  <p class="dim small mb-4">Final score: <strong>$${S.scores[0].toLocaleString()}</strong></p>`}
  <div class="flex gap-12" style="justify-content:center;">
    <button class="btn-ghost" onclick="doRegenSame()">New Board, Same Categories ↗</button>
    <button class="btn-gold" onclick="goTo('j-setup')">Change Setup</button>
  </div>
</div>`;
}

/* ═══════════════════════════════════════════════════════
   JEOPARDY MODAL
═══════════════════════════════════════════════════════ */
function openJeopardyQ(ci, pi) {
  if (!S.board[ci] || !S.board[ci].questions) return;
  S.activeQ = { ci, pi };
  S.timeLeft = 30;
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
  renderModal(false);

  S.timerInterval = setInterval(() => {
    S.timeLeft--;
    const el = document.getElementById('timer-num');
    if (el) {
      el.textContent = S.timeLeft;
      el.style.color = S.timeLeft > 15
        ? 'var(--green)'
        : S.timeLeft > 5
        ? 'var(--gold)'
        : 'var(--red)';
    }
    if (S.timeLeft <= 0) {
      clearInterval(S.timerInterval);
      S.timerInterval = null;
      renderModal(true);
    }
  }, 1000);
}

function renderModal(revealed) {
  const { ci, pi } = S.activeQ;
  const q   = S.board[ci].questions[pi];
  const pt  = JEOPARDY_PTS[pi];
  const cat = S.board[ci].category;
  const tc  = S.timeLeft > 15 ? 'var(--green)' : S.timeLeft > 5 ? 'var(--gold)' : 'var(--red)';

  document.getElementById('modal-root').innerHTML = `
<div class="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-box" id="modal-inner">
    <!-- Header -->
    <div class="flex-between mb-3">
      <div>
        <p class="xsmall dim bold" style="text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">${cat}</p>
        <div style="font-family:var(--font-heading);font-size:1.8rem;color:var(--gold);">$${pt}</div>
      </div>
      <div class="flex-center gap-16">
        ${!revealed ? `
        <div class="center">
          <div class="timer-num" id="timer-num" style="color:${tc};">${S.timeLeft}</div>
          <div class="xsmall muted" style="text-transform:uppercase;letter-spacing:.05em;">sec</div>
        </div>` : ''}
        <button onclick="closeModal()" style="background:none;color:var(--text-dim);padding:6px;font-size:20px;line-height:1;">✕</button>
      </div>
    </div>

    <!-- Clue -->
    <div class="card mb-4" style="border-color:rgba(255,255,255,.1);">
      <p style="font-size:17px;line-height:1.75;font-weight:500;">${q.clue}</p>
    </div>

    ${revealed ? `
    <!-- Answer -->
    <div class="explain-box mb-4">
      <p class="xsmall dim bold" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Answer</p>
      <p style="font-size:18px;font-weight:600;margin-bottom:${q.explanation?'10px':'0'};">${q.answer}</p>
      ${q.explanation ? `<p class="small dim" style="line-height:1.65;">${q.explanation}</p>` : ''}
    </div>

    ${S.numPlayers > 1 ? `
    <p class="small dim bold mb-2">Who answered correctly?</p>
    ${S.playerNames.slice(0, S.numPlayers).map((name, i) => `
    <button class="btn-success mb-1" onclick="awardPoints(${i}, ${pt})">
      ✓ ${name} — correct (+$${pt})
    </button>`).join('')}
    <button class="btn-danger" onclick="awardPoints(-1, ${pt})">
      ✗ Nobody / Skip
    </button>` : `
    <div class="grid2">
      <button class="btn-success" onclick="awardPoints(0, ${pt})">✓ Correct +$${pt}</button>
      <button class="btn-danger" onclick="awardPoints(-1, ${pt})">✗ Skip</button>
    </div>`}
    ` : `
    <button class="btn-primary w100" onclick="revealAnswer()">Reveal Answer</button>
    `}
  </div>
</div>`;
}

function handleOverlayClick(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
}

function revealAnswer() {
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
  renderModal(true);
}

function closeModal() {
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
  document.getElementById('modal-root').innerHTML = '';
}

function awardPoints(playerIdx, pts) {
  if (playerIdx >= 0) S.scores[playerIdx] += pts;
  const { ci, pi } = S.activeQ;
  S.answered.add(`${ci}-${pi}`);
  closeModal();
  render();
}

async function doRegenSame() {
  if (S.lastCats && S.lastCats.length === 6) {
    await buildJeopardyBoard(S.lastCats);
  } else {
    goTo('j-setup');
  }
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
