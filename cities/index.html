<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<style>
:root{
  --bg:#0d1b2a;--s1:#0f1e30;--s2:#162840;--border:#1e3a55;
  --accent:#00c8f0;--gold:#ffd700;--green:#34d975;--red:#ff453a;
  --orange:#ff6b35;--yellow:#ffd60a;
  --text:#e8f0fa;--muted:#7090b0;--dim:#2a4060;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  /* Priority colors */
  --p1:#00c8f0;  /* Must know */
  --p2:#34d975;  /* Should know */
  --p3:#ffd60a;  /* Good to know */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
#app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available;padding-top:var(--safe-top);}

/* HEADER */
#hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:1000;}
.logo{font-size:17px;font-weight:800;letter-spacing:1px;color:var(--accent);white-space:nowrap;}
.logo span{color:var(--gold);}
#sw{flex:1;position:relative;}
#si{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:7px 14px 7px 32px;font-size:14px;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;}
#si::placeholder{color:var(--muted);}
#sicon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
#sres{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s1);border:1px solid var(--border);border-radius:12px;max-height:260px;overflow-y:auto;z-index:3000;display:none;box-shadow:0 8px 24px rgba(0,0,0,.6);}
.si-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.si-item:last-child{border-bottom:none;}
.si-item:active{background:var(--s2);}
.sid{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sin{font-size:13px;font-weight:700;}
.sic{font-size:11px;color:var(--muted);}

/* FILTER ROW */
#filters{background:var(--s1);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:center;}
#filters::-webkit-scrollbar{display:none;}
.fc{flex-shrink:0;padding:5px 10px;border-radius:16px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.fc:active{transform:scale(.95);}
.fc.on{color:#000;}
.fc[data-f="all"].on{background:var(--text);border-color:var(--text);}
.fc[data-f="p1"].on{background:var(--p1);border-color:var(--p1);}
.fc[data-f="p2"].on{background:var(--p2);border-color:var(--p2);}
.fc[data-f="p3"].on{background:var(--p3);border-color:var(--p3);}
.fc[data-f="AF"].on{background:#ff6b35;border-color:#ff6b35;}
.fc[data-f="AS"].on{background:#ab47bc;border-color:#ab47bc;}
.fc[data-f="EU"].on{background:#42a5f5;border-color:#42a5f5;}
.fc[data-f="NA"].on{background:#66bb6a;border-color:#66bb6a;}
.fc[data-f="SA"].on{background:#26c6da;border-color:#26c6da;}
.fc[data-f="OC"].on{background:#ffa726;border-color:#ffa726;}
.fsep{color:var(--dim);font-size:14px;flex-shrink:0;}

/* MAP */
#map{flex:1;z-index:1;}

/* LEAFLET POPUP */
.leaflet-popup-content-wrapper{background:var(--s1);border:1.5px solid var(--border);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.7);color:var(--text);font-family:-apple-system,sans-serif;max-width:270px;}
.leaflet-popup-tip{background:var(--s1);}
.leaflet-popup-close-button{color:var(--muted) !important;font-size:18px !important;top:8px !important;right:10px !important;}
.phead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.pname{font-size:17px;font-weight:800;line-height:1.2;}
.pbadge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:8px;color:#000;white-space:nowrap;margin-top:3px;}
.pbadge.p1{background:var(--p1);}
.pbadge.p2{background:var(--p2);}
.pbadge.p3{background:var(--p3);}
.pcountry{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:5px;}
.pregion{font-size:11px;color:var(--muted);margin-bottom:7px;font-family:'SF Mono',Menlo,monospace;}
.pnote{font-size:13px;line-height:1.6;color:var(--text);}
.ptrap{font-size:12px;color:var(--red);margin-top:6px;font-weight:600;}

/* Custom markers */
.cm{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.5);box-shadow:0 1px 6px rgba(0,0,0,.6);cursor:pointer;}
.cm.p1{background:var(--p1);}
.cm.p2{background:var(--p2);}
.cm.p3{background:var(--p3);}
/* Region variants - slightly different tones */
.cm.AF{opacity:.95;}
.cm.EU{opacity:.95;}

/* BOTTOM INFO BAR */
#infobar{position:absolute;bottom:calc(var(--safe-bottom) + 8px);left:50%;transform:translateX(-50%);background:rgba(13,27,42,.92);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;font-family:'SF Mono',Menlo,monospace;color:var(--accent);z-index:500;pointer-events:none;white-space:nowrap;}

/* LEGEND */
#leg{position:absolute;top:10px;right:10px;background:rgba(13,27,42,.92);border:1px solid var(--border);border-radius:10px;padding:10px 12px;z-index:500;}
.li{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:5px;}
.li:last-child{margin-bottom:0;}
.ld{width:11px;height:11px;border-radius:50%;}
</style>
</head>

<div id="app">
  <div id="hdr">
    <div class="logo">CITY<span>MAP</span></div>
    <div id="sw">
      <span id="sicon">🔍</span>
      <input id="si" type="search" placeholder="Search city, country, or note…" autocomplete="off" autocorrect="off" spellcheck="false">
      <div id="sres"></div>
    </div>
  </div>

  <div id="filters">
    <button class="fc on" data-f="all">🌍 All (278)</button>
    <span class="fsep">|</span>
    <button class="fc" data-f="p1" title="Must know — highest exam priority">🔵 Must Know</button>
    <button class="fc" data-f="p2" title="Should know">🟢 Should Know</button>
    <button class="fc" data-f="p3" title="Good to know">🟡 Good to Know</button>
    <span class="fsep">|</span>
    <button class="fc" data-f="AF">🌍 Africa</button>
    <button class="fc" data-f="AS">🌏 Asia</button>
    <button class="fc" data-f="EU">🇪🇺 Europe</button>
    <button class="fc" data-f="NA">🌎 N.America</button>
    <button class="fc" data-f="SA">🌎 S.America</button>
    <button class="fc" data-f="OC">🏝 Oceania</button>
  </div>

  <div id="map"></div>
  <div id="infobar">Showing <span id="shown">278</span> of 278 cities</div>
</div>

<!-- LEGEND -->
<div id="leg">
  <div class="li"><div class="ld" style="background:var(--p1)"></div><span style="color:var(--text);font-size:11px">Must Know</span></div>
  <div class="li"><div class="ld" style="background:var(--p2)"></div><span style="color:var(--text);font-size:11px">Should Know</span></div>
  <div class="li"><div class="ld" style="background:var(--p3)"></div><span style="color:var(--text);font-size:11px">Good to Know</span></div>
</div>

<script>
const CITIES = JSON.parse(document.getElementById('CD').textContent);

// Continent lookup from region string
function cont(r){
  const s = r.toLowerCase();
  if(s.includes('africa')||s==='central africa'||s==='west africa'||s==='east africa'||s==='north africa'||s==='southern africa'||s==='northeast africa') return 'AF';
  if(s.includes('asia')||s==='middle east'||s==='caucasus'||s==='south asia'||s==='central asia'||s==='se asia'||s==='east asia') return 'AS';
  if(s.includes('europe')||s==='balkans'||s==='british isles'||s==='northern europe'||s==='western europe'||s==='central europe'||s==='southern europe'||s==='eastern europe') return 'EU';
  if(s==='canada'||s==='usa'||s==='mexico'||s==='caribbean'||s==='central america') return 'NA';
  if(s==='south america') return 'SA';
  if(s==='australia'||s==='new zealand'||s==='pacific') return 'OC';
  return 'XX';
}

// Trap cities (capital ≠ largest city)
const TRAPS = new Set(['Sydney','Lagos','Casablanca','Dar es Salaam','Johannesburg','Auckland','Dubai','Istanbul','Karachi','Mumbai','Colombo','Yangon','Abidjan','São Paulo','Rio de Janeiro','Kinshasa']);

const PNAMES = {1:'Must Know',2:'Should Know',3:'Good to Know'};
const PCOLS = {1:'#00c8f0',2:'#34d975',3:'#ffd60a'};

// Init map
const map = L.map('map',{center:[20,10],zoom:2,minZoom:2,maxZoom:9,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);
L.control.attribution({prefix:'© OpenStreetMap contributors'}).addTo(map);

let layerGroup = L.layerGroup().addTo(map);
let markers = [];
let activeFilter = 'all';

function makeIcon(city){
  const col = PCOLS[city.p]||'#fff';
  return L.divIcon({
    html:`<div class="cm p${city.p}"></div>`,
    className:'',iconSize:[16,16],iconAnchor:[8,8],popupAnchor:[0,-10]
  });
}

function makePopup(city){
  const isTrap = TRAPS.has(city.n);
  const trapNote = isTrap ? `<div class="ptrap">⚠ Common trap — check if this is actually the CAPITAL</div>` : '';
  return `
    <div class="phead">
      <div class="pname">${city.n}</div>
      <span class="pbadge p${city.p}">${PNAMES[city.p]}</span>
    </div>
    <div class="pcountry">${city.c}</div>
    <div class="pregion">${city.r}</div>
    <div class="pnote">${city.note}</div>
    ${trapNote}
  `;
}

function buildMarkers(){
  layerGroup.clearLayers();
  markers = [];
  
  let filtered;
  if(activeFilter==='all') filtered = CITIES;
  else if(activeFilter==='p1'||activeFilter==='p2'||activeFilter==='p3'){
    const p = parseInt(activeFilter[1]);
    filtered = CITIES.filter(c=>c.p===p);
  } else {
    // Continent filter
    filtered = CITIES.filter(c=>cont(c.r)===activeFilter);
  }
  
  filtered.forEach(city=>{
    const m = L.marker([city.lat,city.lng],{icon:makeIcon(city)});
    m.bindPopup(makePopup(city),{maxWidth:270});
    m.cityData = city;
    layerGroup.addLayer(m);
    markers.push(m);
  });
  
  document.getElementById('shown').textContent = filtered.length;
}

// Filter chips
document.querySelectorAll('.fc').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fc').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter = btn.dataset.f;
    buildMarkers();
  });
});

// Search
const si = document.getElementById('si');
const sres = document.getElementById('sres');

function doSearch(q){
  if(!q||q.length<2){sres.style.display='none';return;}
  const l = q.toLowerCase();
  const hits = CITIES.filter(c=>
    c.n.toLowerCase().includes(l)||
    c.c.toLowerCase().includes(l)||
    c.r.toLowerCase().includes(l)||
    c.note.toLowerCase().includes(l)
  ).slice(0,15);
  if(!hits.length){sres.style.display='none';return;}
  sres.innerHTML = hits.map(c=>`
    <div class="si-item" data-lat="${c.lat}" data-lng="${c.lng}" data-name="${c.n}">
      <div class="sid" style="background:${PCOLS[c.p]}"></div>
      <div>
        <div class="sin">${c.n}</div>
        <div class="sic">${c.c} · ${c.r}</div>
      </div>
    </div>`).join('');
  sres.style.display='block';
  sres.querySelectorAll('.si-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const lat=parseFloat(item.dataset.lat);
      const lng=parseFloat(item.dataset.lng);
      const name=item.dataset.name;
      map.setView([lat,lng],6,{animate:true});
      setTimeout(()=>{
        markers.forEach(m=>{if(m.cityData&&m.cityData.n===name) m.openPopup();});
      },400);
      si.value=''; sres.style.display='none';
    });
  });
}

si.addEventListener('input',e=>doSearch(e.target.value));
si.addEventListener('focus',e=>doSearch(e.target.value));
document.addEventListener('click',e=>{if(!e.target.closest('#sw')) sres.style.display='none';});
si.addEventListener('touchend',e=>e.stopPropagation());

// Zoom to continent on filter
const CONT_VIEWS = {
  AF:{c:[-2,22],z:3}, AS:{c:[30,90],z:3}, EU:{c:[52,15],z:4},
  NA:{c:[45,-95],z:3}, SA:{c:[-15,-55],z:3}, OC:{c:[-25,140],z:3},
};

document.querySelectorAll('.fc[data-f]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const f = btn.dataset.f;
    if(CONT_VIEWS[f]){
      map.setView(CONT_VIEWS[f].c, CONT_VIEWS[f].z, {animate:true});
    }
  });
});

buildMarkers();
</script>
</body>
</html>
