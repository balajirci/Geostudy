function rJSetup() {
  return `
<div style="max-width:520px;margin:0 auto;padding:1.5rem 0">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:2rem">
    <button class="back-btn" onclick="go('home')"><i class="ti ti-arrow-left"></i> Back</button>
    <h2 style="margin:0">Jeopardy Final Round</h2>
  </div>

  <div style="margin-bottom:1.5rem">
    <label style="font-size:13px;color:var(--text-secondary);display:block;margin-bottom:8px;font-weight:500">Number of players</label>
    <div style="display:flex;gap:8px">
      ${[1,2,3].map(n=>`<button onclick="S.jPlayers=${n};render()" style="flex:1;padding:10px;cursor:pointer;border-radius:var(--br-md);border:.5px solid var(--border);background:${S.jPlayers===n?'var(--bg-tertiary)':'var(--bg-primary)'};font-weight:${S.jPlayers===n?'500':'400'}">${n} Player${n>1?'s':''}</button>`).join('')}
    </div>
  </div>

  ${S.jPlayers>1?Array.from({length:S.jPlayers},(_,i)=>`
  <div style="margin-bottom:1rem">
    <label style="font-size:13px;color:var(--text-secondary);display:block;margin-bottom:6px;font-weight:500">Player ${i+1} name</label>
    <input type="text" value="${S.jNames[i]}" onchange="S.jNames[${i}]=this.value" style="width:100%">
  </div>`).join(''):''}

  <div style="margin-bottom:1.5rem">
    <label style="font-size:13px;color:var(--text-secondary);display:block;margin-bottom:10px;font-weight:500">Categories <span style="font-weight:400">(select exactly 6, or leave unchecked for 6 random)</span></label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${J_CATS.map((cat,i)=>`
      <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;color:var(--text-secondary)">
        <input type="checkbox" id="jc${i}" value="${cat}" style="margin-top:2px;cursor:pointer;flex-shrink:0">
        ${cat}
      </label>`).join('')}
    </div>
  </div>
  <button onclick="doStartJ()" style="width:100%;padding:13px;font-size:15px;font-weight:500;cursor:pointer;border-radius:var(--br-md)">Generate Board ↗</button>
  <p style="font-size:12px;color:var(--text-tertiary);text-align:center;margin-top:10px">${Object.values(JQ).reduce((a,v)=>a+v.length,0)} clues at national finals difficulty</p>
</div>`;
}

function doStartJ() {
  const checked = Array.from(document.querySelectorAll('#app input[type=checkbox]:checked')).map(c=>c.value);
  let cats;
  if (checked.length>=6) cats=checked.slice(0,6);
  else { const rest=J_CATS.filter(c=>!checked.includes(c)).sort(()=>Math.random()-.5); cats=[...checked,...rest].slice(0,6); }
  S.lastCats=cats;
  S.board=buildBoard(cats);
  S.jScores=[0,0,0];
  S.answered=new Set();
  go('j-board');
}

function rJBoard() {
  const allDone = S.answered.size===S.board.length*5;
  return `
<div style="max-width:900px;margin:0 auto;padding:1rem 0">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <button class="back-btn" onclick="if(confirm('Leave board?'))go('j-setup')"><i class="ti ti-arrow-left"></i> Setup</button>
    <div style="display:flex;gap:20px">
      ${S.jNames.slice(0,S.jPlayers).map((n,i)=>`
      <div style="text-align:center">
        <div class="tag" style="margin-bottom:2px">${n}</div>
        <div style="font-size:20px;font-weight:500;color:${S.jScores[i]<0?'var(--text-danger)':'var(--text-primary)'}">${S.jScores[i]<0?'−$':'$'}${Math.abs(S.jScores[i]).toLocaleString()}</div>
      </div>`).join('')}
    </div>
    <div style="font-size:12px;color:var(--text-secondary)">${S.answered.size}/${S.board.length*5} played</div>
  </div>

  <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;table-layout:fixed">
      <thead><tr>
        ${S.board.map(c=>`<th style="padding:10px 6px;font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;border:.5px solid var(--border);background:var(--bg-secondary);text-align:center;height:54px;line-height:1.4;vertical-align:middle">${c.category}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${PTS.map((pt,pi)=>`<tr>${S.board.map((cat,ci)=>{
          const key=`${ci}-${pi}`, done=S.answered.has(key);
          return `<td style="border:.5px solid var(--border);height:62px;padding:4px;text-align:center;vertical-align:middle">
            ${done?`<span style="font-size:16px;font-weight:500;color:var(--border-strong);opacity:.3">$${pt}</span>`
            :`<button class="jpt-btn" onclick="openQ(${ci},${pi})">$${pt}</button>`}
          </td>`;
        }).join('')}</tr>`).join('')}
      </tbody>
    </table>
  </div>

  ${allDone?`
  <div style="margin-top:1.5rem;padding:1.5rem;background:var(--bg-secondary);border-radius:var(--br-lg);text-align:center">
    <p style="font-size:15px;font-weight:500;margin:0 0 1rem">Board complete!</p>
    ${S.jPlayers>1?`<div style="display:flex;gap:10px;justify-content:center;margin-bottom:1.25rem;flex-wrap:wrap">
      ${S.jNames.slice(0,S.jPlayers).map((n,i)=>({n,s:S.jScores[i]})).sort((a,b)=>b.s-a.s).map((p,rank)=>`
      <div style="background:var(--bg-primary);border:.5px solid var(--border);border-radius:var(--br-md);padding:.875rem 1.25rem;min-width:110px">
        <div class="tag" style="margin-bottom:4px">${['1st','2nd','3rd'][rank]}</div>
        <div style="font-size:14px;font-weight:500;margin-bottom:4px">${p.n}</div>
        <div style="font-size:20px;font-weight:500">$${p.s.toLocaleString()}</div>
      </div>`).join('')}
    </div>`:''}
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="doRegenSame()" style="padding:11px 22px;cursor:pointer;border-radius:var(--br-md)">New Board, Same Categories</button>
      <button onclick="go('j-setup')" style="padding:11px 22px;cursor:pointer;border-radius:var(--br-md)">Change Setup</button>
    </div>
  </div>`:''}
</div>`;
}

function doRegenSame() {
  if(S.lastCats&&S.lastCats.length===6){S.board=buildBoard(S.lastCats);S.jScores=[0,0,0];S.answered=new Set();go('j-board');}
  else go('j-setup');
}

// ─────────────────────────────────────────────
//  JEOPARDY MODAL MANAGEMENT
// ─────────────────────────────────────────────
function openQ(ci,pi) {
  if(!S.board[ci]||!S.board[ci].questions) return;
  S.activeQ={ci,pi};
  S.timeLeft=30;
  if(S.timerI){clearInterval(S.timerI);S.timerI=null;}
  showModal(false);
  S.timerI=setInterval(()=>{
    S.timeLeft--;
    const el=document.getElementById('tnum');
    if(el){
      el.textContent=S.timeLeft;
      el.style.color=S.timeLeft>15?'var(--text-success)':S.timeLeft>5?'var(--text-warn)':'var(--text-danger)';
    }
    if(S.timeLeft<=0){clearInterval(S.timerI);S.timerI=null;showModal(true);}
  },1000);
}

function showModal(revealed) {
  const {ci,pi}=S.activeQ;
  const q=S.board[ci].questions[pi];
  const pt=PTS[pi], cat=S.board[ci].category;
  const tc=S.timeLeft>15?'var(--text-success)':S.timeLeft>5?'var(--text-warn)':'var(--text-danger)';
  document.getElementById('modal-root').innerHTML=`
<div class="modal-bg">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem">
      <div>
        <div class="tag" style="margin-bottom:4px">${cat}</div>
        <div style="font-size:24px;font-weight:500;color:var(--text-warn)">$${pt}</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        ${!revealed?`<div style="text-align:center"><div style="font-size:30px;font-weight:500;color:${tc}" id="tnum">${S.timeLeft}</div><div class="tag">sec</div></div>`:''}
        <button onclick="closeModal()" style="border:none;background:none;cursor:pointer;color:var(--text-secondary);font-size:18px;padding:4px;line-height:1"><i class="ti ti-x"></i></button>
      </div>
    </div>
    <p style="font-size:17px;line-height:1.7;margin:0 0 1.5rem;font-weight:500">${q.clue}</p>
    ${revealed?`
    <div style="background:var(--bg-secondary);border-radius:var(--br-md);padding:1rem 1.25rem;margin-bottom:1.25rem">
      <div class="tag" style="margin-bottom:6px">Answer</div>
      <div style="font-size:16px;font-weight:500;margin-bottom:${q.ex?'8px':'0'}">${q.answer}</div>
      ${q.ex?`<p style="font-size:13px;color:var(--text-secondary);margin:0;line-height:1.65">${q.ex}</p>`:''}
    </div>
    ${S.jPlayers>1?`
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;font-weight:500">Who answered correctly?</p>
    ${S.jNames.slice(0,S.jPlayers).map((n,i)=>`<button onclick="doAward(${i},${pt})" style="width:100%;padding:10px 14px;text-align:left;cursor:pointer;font-size:13px;border:.5px solid var(--border-success);border-radius:var(--br-md);background:var(--bg-success);color:var(--text-success);margin-bottom:7px;font-family:var(--font-sans)"><i class="ti ti-check" style="vertical-align:-1px;margin-right:6px"></i>${n} — correct (+$${pt})</button>`).join('')}
    <button onclick="doAward(-1,${pt})" style="width:100%;padding:10px 14px;text-align:left;cursor:pointer;font-size:13px;border:.5px solid var(--border-danger);border-radius:var(--br-md);background:var(--bg-danger);color:var(--text-danger);font-family:var(--font-sans)"><i class="ti ti-x" style="vertical-align:-1px;margin-right:6px"></i>Nobody / Skip</button>`:`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button onclick="doAward(0,${pt})" style="padding:12px;cursor:pointer;font-size:14px;border:.5px solid var(--border-success);border-radius:var(--br-md);background:var(--bg-success);color:var(--text-success);font-family:var(--font-sans)"><i class="ti ti-check" style="vertical-align:-1px;margin-right:4px"></i>Correct +$${pt}</button>
      <button onclick="doAward(-1,${pt})" style="padding:12px;cursor:pointer;font-size:14px;border:.5px solid var(--border-danger);border-radius:var(--br-md);background:var(--bg-danger);color:var(--text-danger);font-family:var(--font-sans)"><i class="ti ti-x" style="vertical-align:-1px;margin-right:4px"></i>Skip</button>
    </div>`}`:`
    <button onclick="revealAns()" style="width:100%;padding:13px;font-size:15px;font-weight:500;cursor:pointer;border-radius:var(--br-md)">Reveal Answer</button>`}
  </div>
</div>`;
}

function revealAns(){if(S.timerI){clearInterval(S.timerI);S.timerI=null;}showModal(true);}
function closeModal(){if(S.timerI){clearInterval(S.timerI);S.timerI=null;}document.getElementById('modal-root').innerHTML='';}
function doAward(playerIdx,pts){if(playerIdx>=0)S.jScores[playerIdx]+=pts;const{ci,pi}=S.activeQ;S.answered.add(`${ci}-${pi}`);closeModal();render();}

// ─────────────────────────────────────────────
//  INITIALIZATION
// ─────────────────────────────────────────────
render();
</script>
</body>
