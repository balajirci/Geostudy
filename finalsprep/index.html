const API_KEY = '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';  // <-- PUT YOUR API KEY HERE (starts with "sk-ant-")

async function callAPI(systemPrompt, userPrompt) {
    if (!HAS_API_KEY) {
        throw new Error('No valid API key. Please add your Anthropic API key (starts with "sk-ant-") to the API_KEY variable.');
    }
    
    console.log('Calling Anthropic API...');
    
    const response = await fetch(API, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': API_KEY,
            'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
            model: 'claude-3-haiku-20240307',  // Using Haiku for faster/cheaper responses
            max_tokens: 2000,
            temperature: 0.7,
            system: systemPrompt,
            messages: [{ role: 'user', content: userPrompt }]
        })
    });
    
    if (!response.ok) {
        const errorText = await response.text();
        console.error('API Error:', response.status, errorText);
        
        if (response.status === 401) {
            throw new Error('Invalid API key. Please check your Anthropic API key.');
        } else if (response.status === 429) {
            throw new Error('Rate limit exceeded. Please wait a moment and try again.');
        } else {
            throw new Error(`API Error (${response.status}): ${errorText.substring(0, 200)}`);
        }
    }
    
    const data = await response.json();
    console.log('API Response received');
    return data.content[0].text;
}

function parseJSONResponse(text) {
    try {
        // Clean the JSON string
        let cleaned = text.trim();
        
        // Remove markdown code blocks
        if (cleaned.startsWith('```json')) {
            cleaned = cleaned.substring(7);
        } else if (cleaned.startsWith('```')) {
            cleaned = cleaned.substring(3);
        }
        if (cleaned.endsWith('```')) {
            cleaned = cleaned.substring(0, cleaned.length - 3);
        }
        cleaned = cleaned.trim();
        
        return JSON.parse(cleaned);
    } catch (e) {
        console.error('JSON parse error:', e);
        console.error('Raw response:', text.substring(0, 500));
        throw new Error('Failed to parse API response as JSON');
    }
}

async function genCat(category) {
    const systemPrompt = `You are an expert geography educator creating questions for the Canadian Geographic Challenge National Finals. Return ONLY valid JSON, no other text.`;
    
    const userPrompt = `Category: "${category}". Generate exactly 5 Jeopardy-style clues for $200, $400, $600, $800, $1000 (higher points = harder difficulty).

Each clue must be a declarative statement. The answer must start with "What is" or "Who is". Be specific and geographic.

Return a JSON array of exactly 5 objects:
[
  {"points":200,"clue":"...","answer":"What is ...?","explanation":"1-2 sentence geographic context"},
  {"points":400,"clue":"...","answer":"What is ...?","explanation":"..."},
  {"points":600,"clue":"...","answer":"What is ...?","explanation":"..."},
  {"points":800,"clue":"...","answer":"What is ...?","explanation":"..."},
  {"points":1000,"clue":"...","answer":"What is ...?","explanation":"..."}
]

Return ONLY the JSON array, no markdown formatting, no extra text.`;
    
    const response = await callAPI(systemPrompt, userPrompt);
    return parseJSONResponse(response);
}

async function genWritten(topic, count) {
    const systemPrompt = `You are an expert geography educator creating a written test for the Canadian Geographic Challenge National Finals. Return ONLY valid JSON, no other text.`;
    
    const userPrompt = `Topic: "${topic}". Generate exactly ${count} multiple-choice questions at national championship difficulty.

Requirements:
- Mix of: specific geographic facts, reasoning questions, data interpretation, map-reading concepts
- At least 30% Canadian content if topic includes "Mixed"
- Each question has 4 options (A, B, C, D)
- Vary the correct answer position - don't always put it as A

Return a JSON array of exactly ${count} objects:
[
  {
    "question": "...",
    "options": ["A) ...", "B) ...", "C) ...", "D) ..."],
    "correct": 0,
    "explanation": "Detailed explanation of why the answer is correct",
    "topic_tag": "Canadian Geography|World Geography|Human Geography|Environmental|Concepts & Skills|Economic & Political"
  }
]

IMPORTANT: "correct" must be 0, 1, 2, or 3 representing A, B, C, or D.
Return ONLY the JSON array, no markdown formatting, no extra text.`;
    
    const response = await callAPI(systemPrompt, userPrompt);
    const questions = parseJSONResponse(response);
    
    // Validate and fix if needed
    if (!Array.isArray(questions)) {
        throw new Error('Response is not an array');
    }
    
    return questions.slice(0, count);
}

function sc(name) {

}

function rWQuiz() {
    if (S.writtenLoading) {
        return `

</div>`;

function rWResults() {

    const topicMap = {};
    S.questions.forEach((q, i) => {
        const t = q.topic_tag || 'General';
        if (!topicMap[t]) topicMap[t] = { c: 0, n: 0 };
        topicMap[t].n++;
        if (S.userAnswers[i] === q.correct) topicMap[t].c++;
    });
    return `

        return `<div style="margin-bottom:1.5rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;">
      <div style="padding:1rem 1.25rem;display:flex;align-items:flex-start;gap:12px;background:var(--color-background-primary);">
        <span style="flex-shrink:0;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;background:${ok ? 'var(--color-background-success)' : 'var(--color-background-danger)'};color:${ok ? 'var(--color-text-success)' : 'var(--color-text-danger)'};">${i + 1}</span>
        <p style="font-size:14px;margin:0;line-height:1.65;">${q.question}</p>
      </div>
      <div style="padding:1rem 1.25rem;background:var(--color-background-secondary);">
        <p style="font-size:13px;margin:0 0 4px;color:var(--color-text-success);font-weight:500;">✓ ${q.options[q.correct]}</p>
        ${S.userAnswers[i] !== undefined && !ok ? `<p style="font-size:13px;margin:0 0 8px;color:var(--color-text-danger);">✗ ${q.options[S.userAnswers[i]]}</p>` : ''}
        <p style="font-size:13px;color:var(--color-text-secondary);margin:0;line-height:1.65;">${q.explanation}</p>
      </div>
    </div>`;
    }).join('')}
  <button onclick="sc('written-setup')" style="width:100%;padding:12px;font-size:14px;margin-bottom:2rem;cursor:pointer;">New Test ↗</button>
</div>`;
}

function rJSetup() {
    return `
<div style="max-width:520px;margin:0 auto;">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:2rem;">
    <button class="back-btn" onclick="sc('home')"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>
    <h2 style="font-size:20px;font-weight:500;margin:0;">Jeopardy Final Round</h2>
  </div>
  <div style="margin-bottom:1.5rem;">
    <label style="font-size:14px;color:var(--color-text-secondary);display:block;margin-bottom:8px;">Players</label>
    <div style="display:flex;gap:8px;">
      ${[1, 2, 3].map(n => `<button onclick="S.numPlayers=${n};render()" style="flex:1;padding:10px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:${S.numPlayers === n ? 'var(--color-background-secondary)' : 'var(--color-background-primary)'};">${n} Player${n > 1 ? 's' : ''}</button>`).join('')}
    </div>
  </div>
  ${S.numPlayers > 1 ? Array.from({ length: S.numPlayers }, (_, i) => `
  <div style="margin-bottom:1rem;">
    <label style="font-size:14px;color:var(--color-text-secondary);display:block;margin-bottom:6px;">Player ${i + 1} name</label>
    <input type="text" value="${S.playerNames[i]}" onchange="S.playerNames[${i}]=this.value" style="width:100%;" />
  </div>`).join('') : ''}
  <div style="margin-bottom:1.5rem;">
    <label style="font-size:14px;color:var(--color-text-secondary);display:block;margin-bottom:10px;">Categories <span style="font-weight:400;">(check exactly 6 to force, or leave all unchecked for 6 random)</span></label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      ${CATS.map((cat, i) => `
      <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;color:var(--color-text-secondary);">
        <input type="checkbox" id="c${i}" value="${cat}" style="margin-top:2px;cursor:pointer;flex-shrink:0;" />
        ${cat}
      </label>`).join('')}
    </div>
  </div>
  <button onclick="doStartJ()" style="width:100%;padding:12px;font-size:15px;font-weight:500;cursor:pointer;">Generate Board ↗</button>
  <p style="font-size:13px;color:var(--color-text-tertiary);text-align:center;margin-top:12px;">30 AI-generated clues at national finals difficulty</p>
</div>`;
}

function rJBoard() {
    const loaded = S.board.filter(c => c.questions).length;
    const total = S.board.length || 6;
    if (S.boardLoading && loaded < total) {
        return `
<div style="max-width:400px;margin:4rem auto;text-align:center;">
  <i class="ti ti-loader spin" aria-hidden="true" style="font-size:32px;margin-bottom:1rem;display:block;color:var(--color-text-secondary);"></i>
  <p style="font-size:16px;font-weight:500;margin:0 0 8px;">Building board…</p>
  <p style="font-size:14px;color:var(--color-text-secondary);margin:0 0 1.5rem;" id="lct">${loaded} of ${total} categories ready</p>
  <div style="height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;max-width:200px;margin:0 auto;">
    <div id="lbar" style="height:100%;width:${Math.round(loaded / total * 100)}%;background:var(--color-text-warning);transition:width .4s;"></div>
  </div>
</div>`;
    }
    const allDone = S.answered.size === S.board.length * 5;
    return `
<div style="max-width:740px;margin:0 auto;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;">
    <button class="back-btn" onclick="if(confirm('Leave this board?'))sc('j-setup')"><i class="ti ti-arrow-left" aria-hidden="true"></i> Setup</button>
    <div style="display:flex;gap:20px;">
      ${S.playerNames.slice(0, S.numPlayers).map((name, i) => `
      <div style="text-align:center;">
        <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em;">${name}</div>
        <div style="font-size:20px;font-weight:500;color:${S.scores[i] >= 0 ? 'var(--color-text-primary)' : 'var(--color-text-danger)'};">${S.scores[i] < 0 ? '−$' : '$'}${Math.abs(S.scores[i]).toLocaleString()}</div>
      </div>`).join('')}
    </div>
    <div style="font-size:13px;color:var(--color-text-secondary);">${S.answered.size}/${S.board.length * 5} played</div>
  </div>
  <div style="overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
      <thead>
        <tr>${S.board.map(c => `<th style="padding:8px 4px;font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);text-align:center;height:52px;line-height:1.35;vertical-align:middle;">${c.category}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${PTS.map((pt, pi) => `<tr>${S.board.map((cat, ci) => {
            const key = `${ci}-${pi}`;
            const done = S.answered.has(key);
            const loading = !cat.questions;
            return `<td style="border:0.5px solid var(--color-border-tertiary);height:60px;padding:4px;text-align:center;vertical-align:middle;">
            ${loading ? `<span style="font-size:11px;color:var(--color-text-tertiary);">…</span>`
                    : done ? `<span style="font-size:16px;font-weight:500;color:var(--color-text-secondary);opacity:.2;">$${pt}</span>`
                        : `<button class="jpt-btn" onclick="openQ(${ci},${pi})">$${pt}</button>`}
            </td>`;
        }).join('')}</tr>`).join('')}
      </tbody>
    </table>
  </div>
  ${allDone ? `
  <div style="margin-top:2rem;padding:1.5rem;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);text-align:center;">
    <p style="font-size:16px;font-weight:500;margin:0 0 1.25rem;">Board complete!</p>
    ${S.numPlayers > 1 ? `<div style="display:flex;gap:12px;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;">
      ${S.playerNames.slice(0, S.numPlayers).map((n, i) => ({ n, s: S.scores[i] })).sort((a, b) => b.s - a.s).map((p, rank) => `
      <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:1rem 1.5rem;min-width:120px;">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;">${['1st place', '2nd place', '3rd place'][rank]}</div>
        <div style="font-size:15px;font-weight:500;margin-bottom:4px;">${p.n}</div>
        <div style="font-size:22px;font-weight:500;">$${p.s.toLocaleString()}</div>
      </div>`).join('')}
    </div>` : ''}
    <button onclick="doRegenSame()" style="padding:12px 28px;font-size:14px;cursor:pointer;margin-right:10px;">New Board, Same Categories ↗</button>
    <button onclick="sc('j-setup')" style="padding:12px 28px;font-size:14px;cursor:pointer;">Change Setup</button>
  </div>` : ''}
</div>`;
}

function openQ(ci, pi) {
    if (!S.board[ci] || !S.board[ci].questions) return;
    S.activeQ = { ci, pi };
    S.timeLeft = 30;
    if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
    showModal(false);
    S.timerInterval = setInterval(() => {
        S.timeLeft--;
        const el = document.getElementById('tnum');
        if (el) {
            el.textContent = S.timeLeft;
            el.style.color = S.timeLeft > 15 ? 'var(--color-text-success)' : S.timeLeft > 5 ? 'var(--color-text-warning)' : 'var(--color-text-danger)';
        }
        if (S.timeLeft <= 0) { clearInterval(S.timerInterval); S.timerInterval = null; showModal(true); }
    }, 1000);
}

function showModal(revealed) {
    const { ci, pi } = S.activeQ;
    const q = S.board[ci].questions[pi];
    const pt = PTS[pi];
    const cat = S.board[ci].category;
    const tc = S.timeLeft > 15 ? 'var(--color-text-success)' : S.timeLeft > 5 ? 'var(--color-text-warning)' : 'var(--color-text-danger)';
    document.getElementById('modal-root').innerHTML = `
<div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:2rem;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;">
      <div>
        <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">${cat}</div>
        <div style="font-size:24px;font-weight:500;color:var(--color-text-warning);">$${pt}</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        ${!revealed ? `<div style="text-align:center;"><div style="font-size:30px;font-weight:500;color:${tc};" id="tnum">${S.timeLeft}</div><div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;">sec</div></div>` : ''}
        <button onclick="closeModal()" style="border:none;background:none;cursor:pointer;color:var(--color-text-secondary);font-size:16px;padding:4px;line-height:1;"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>
    </div>
    <p style="font-size:17px;line-height:1.7;margin:0 0 1.5rem;font-weight:500;">${q.clue}</p>
    ${revealed ? `
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem 1.25rem;margin-bottom:1.5rem;">
      <div style="font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Answer</div>
      <div style="font-size:17px;font-weight:500;margin-bottom:${q.explanation ? '8px' : '0'};">${q.answer}</div>
      ${q.explanation ? `<p style="font-size:13px;color:var(--color-text-secondary);margin:0;line-height:1.65;">${q.explanation}</p>` : ''}
    </div>
    ${S.numPlayers > 1 ? `
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:10px;font-weight:500;">Who answered correctly?</p>
    ${S.playerNames.slice(0, S.numPlayers).map((n, i) => `
    <button onclick="doAward(${i},${pt})" style="width:100%;padding:10px 14px;text-align:left;cursor:pointer;font-size:14px;border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);background:var(--color-background-success);color:var(--color-text-success);margin-bottom:8px;font-family:var(--font-sans);">
      <i class="ti ti-check" aria-hidden="true" style="vertical-align:-1px;margin-right:6px;"></i>${n} — correct (+$${pt})
    </button>`).join('')}
    <button onclick="doAward(-1,${pt})" style="width:100%;padding:10px 14px;text-align:left;cursor:pointer;font-size:14px;border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);background:var(--color-background-danger);color:var(--color-text-danger);font-family:var(--font-sans);">
      <i class="ti ti-x" aria-hidden="true" style="vertical-align:-1px;margin-right:6px;"></i>Nobody / Skip
    </button>` : `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button onclick="doAward(0,${pt})" style="padding:12px;cursor:pointer;font-size:14px;border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);background:var(--color-background-success);color:var(--color-text-success);font-family:var(--font-sans);">
        <i class="ti ti-check" aria-hidden="true" style="vertical-align:-1px;margin-right:4px;"></i>Correct +$${pt}
      </button>
      <button onclick="doAward(-1,${pt})" style="padding:12px;cursor:pointer;font-size:14px;border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);background:var(--color-background-danger);color:var(--color-text-danger);font-family:var(--font-sans);">
        <i class="ti ti-x" aria-hidden="true" style="vertical-align:-1px;margin-right:4px;"></i>Skip
      </button>
    </div>`}` : `
    <button onclick="revealAns()" style="width:100%;padding:12px;font-size:15px;font-weight:500;cursor:pointer;">Reveal Answer</button>`}
  </div>
</div>`;
}

function revealAns() { if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; } showModal(true); }
function closeModal() { if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; } document.getElementById('modal-root').innerHTML = ''; }
function doAward(playerIdx, pts) { if (playerIdx >= 0) S.scores[playerIdx] += pts; const { ci, pi } = S.activeQ; S.answered.add(`${ci}-${pi}`); closeModal(); render(); }
function doAns(idx) { S.userAnswers[S.currentQ] = idx; render(); }
function doNext() { if (S.currentQ < S.questions.length - 1) { S.currentQ++; render(); } }
function doReview() { S.screen = 'written-review'; render(); }

async function doStartWritten() {
    S.writtenLoading = true;
    S.questions = [];
    S.currentQ = 0;
    S.userAnswers = [];
    S.screen = 'written-quiz';
    render();
    
    try {
        S.questions = await genWritten(S.writtenTopic, S.writtenCount);
        S.writtenLoading = false;
        S.lastError = null;
        render();
    } catch (e) {
        console.error('Written test generation failed:', e);
        S.writtenLoading = false;
        S.lastError = e.message;
        alert('Error generating questions: ' + e.message + '\n\nPlease check:\n1. Your API key is correct (starts with "sk-ant-")\n2. You have credits in your Anthropic account\n3. Your internet connection is working');
        sc('written-setup');
    }
}

async function runBoardGen(cats) {
    S.board = cats.map(cat => ({ category: cat, questions: null }));
    S.scores = [0, 0, 0];
    S.answered = new Set();
    S.boardLoading = true;
    S.screen = 'j-board';
    render();
    
    let loaded = 0;
    const upd = () => {
        loaded++;
        const el = document.getElementById('lct');
        const bar = document.getElementById('lbar');
        if (el) el.textContent = `${loaded} of ${S.board.length} categories ready`;
        if (bar) bar.style.width = Math.round(loaded / S.board.length * 100) + '%';
    };
    
    const results = await Promise.all(cats.map(async (cat, i) => {
        try {
            S.board[i].questions = await genCat(cat);
        } catch (e) {
            console.error(`Failed to generate ${cat}:`, e);
            // Create fallback questions for this category
            S.board[i].questions = PTS.map((pt, idx) => ({
                points: pt,
                clue: `${cat} — $${pt} question: What is the capital city of Canada?`,
                answer: "What is Ottawa?",
                explanation: "Ottawa is the capital of Canada, located in Ontario along the Ottawa River."
            }));
        }
        upd();
    }));
    
    S.boardLoading = false;
    render();
}

async function doStartJ() {
    const checkboxes = document.querySelectorAll('#app input[type="checkbox"]:checked');
    const checked = Array.from(checkboxes).map(c => c.value);
    let cats;
    if (checked.length >= 6) {
        cats = checked.slice(0, 6);
    } else {
        const rest = CATS.filter(c => !checked.includes(c)).sort(() => Math.random() - 0.5);
        cats = [...checked, ...rest].slice(0, 6);
    }
    S.lastCats = cats;
    await runBoardGen(cats);
}

async function doRegenSame() {
    if (S.lastCats && S.lastCats.length === 6) {
        await runBoardGen(S.lastCats);
    } else {
        sc('j-setup');
    }
}

// Initialize
render();
</script>
</body>
</html>
