<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MapDrill">
<meta name="theme-color" content="#0d1b2a">
<title>Map Drill – Geography Reference</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#0d1b2a;--s1:#112240;--s2:#1a3358;--border:#2a4a6e;
  --accent:#00c8f0;--gold:#ffd700;--green:#34d975;--red:#ff453a;
  --orange:#ff6b35;--yellow:#ffd60a;--purple:#bf5af2;
  --text:#e8f0fa;--muted:#7a9ab8;--dim:#3a5572;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  /* Category colors */
  --c-capitals:#00c8f0;
  --c-rivers:#4fc3f7;
  --c-mountains:#ff6b35;
  --c-deserts:#ffd60a;
  --c-lakes:#29b6f6;
  --c-straits:#ab47bc;
  --c-special:#34d975;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
#app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available;padding-top:var(--safe-top);}

/* HEADER */
#hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;z-index:1000;}
.logo{font-size:18px;font-weight:800;letter-spacing:1.5px;color:var(--accent);white-space:nowrap;}
.logo span{color:var(--gold);}
#search-wrap{flex:1;position:relative;}
#search{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:7px 14px 7px 32px;font-size:14px;color:var(--text);font-family:inherit;outline:none;}
#search::placeholder{color:var(--muted);}
#search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
#search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s1);border:1px solid var(--border);border-radius:12px;max-height:280px;overflow-y:auto;z-index:2000;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sr-item:last-child{border-bottom:none;}
.sr-item:active{background:var(--s2);}
.sr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sr-name{font-size:13px;font-weight:600;}
.sr-sub{font-size:11px;color:var(--muted);}

/* FILTER BAR */
#filters{background:var(--s1);border-bottom:1px solid var(--border);display:flex;gap:6px;padding:8px 10px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#filters::-webkit-scrollbar{display:none;}
.fchip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.fchip:active{transform:scale(.95);}
.fchip.on{color:#000 !important;}
.fchip[data-cat="all"].on{background:var(--text);border-color:var(--text);color:#000;}
.fchip[data-cat="capitals"].on{background:var(--c-capitals);border-color:var(--c-capitals);}
.fchip[data-cat="rivers"].on{background:var(--c-rivers);border-color:var(--c-rivers);}
.fchip[data-cat="mountains"].on{background:var(--c-mountains);border-color:var(--c-mountains);}
.fchip[data-cat="deserts"].on{background:var(--c-deserts);border-color:var(--c-deserts);}
.fchip[data-cat="lakes"].on{background:var(--c-lakes);border-color:var(--c-lakes);}
.fchip[data-cat="straits"].on{background:var(--c-straits);border-color:var(--c-straits);}
.fchip[data-cat="special"].on{background:var(--c-special);border-color:var(--c-special);}
.fcount{font-size:10px;opacity:.8;}

/* MAP */
#map{flex:1;z-index:1;}

/* Leaflet overrides */
.leaflet-popup-content-wrapper{background:var(--s1);border:1.5px solid var(--border);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.6);color:var(--text);font-family:-apple-system,sans-serif;max-width:260px;}
.leaflet-popup-tip{background:var(--s1);}
.leaflet-popup-close-button{color:var(--muted) !important;font-size:18px !important;top:8px !important;right:10px !important;}
.popup-name{font-size:16px;font-weight:800;margin-bottom:4px;line-height:1.2;}
.popup-cat{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:inline-block;padding:2px 8px;border-radius:8px;color:#000;}
.popup-note{font-size:13px;line-height:1.6;color:var(--muted);}
.popup-sub{font-size:11px;color:var(--dim);margin-top:6px;font-family:'SF Mono',Menlo,monospace;}

/* Custom markers */
.cmarker{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer;transition:transform .15s;}
.cmarker.capitals{background:var(--c-capitals);}
.cmarker.rivers{background:var(--c-rivers);}
.cmarker.mountains{background:var(--c-mountains);}
.cmarker.deserts{background:var(--c-deserts);color:#000;}
.cmarker.lakes{background:var(--c-lakes);}
.cmarker.straits{background:var(--c-straits);}
.cmarker.special{background:var(--c-special);color:#000;}

/* Label markers (showing name on map) */
.lmarker{background:rgba(13,27,42,.85);color:var(--text);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid var(--border);pointer-events:none;}

/* COUNTER */
#counter{position:absolute;bottom:calc(var(--safe-bottom) + 8px);right:10px;background:rgba(17,34,64,.9);border:1px solid var(--border);border-radius:10px;padding:6px 12px;font-size:12px;font-family:'SF Mono',Menlo,monospace;color:var(--accent);z-index:500;pointer-events:none;}

/* LEGEND */
#legend{position:absolute;bottom:calc(var(--safe-bottom) + 8px);left:10px;background:rgba(17,34,64,.9);border:1px solid var(--border);border-radius:10px;padding:8px 12px;z-index:500;display:none;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);margin-bottom:4px;}
.leg-item:last-child{margin-bottom:0;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
</style>
</head>

 LONGER (trap!)."},{"n":"Missouri River","lat":43.0,"lng":-101.0,"cat":"rivers","sub":"NA","note":"Longest river in USA. Flows east from Montana to join Mississippi near St. Louis."},{"n":"Colorado River","lat":36.5,"lng":-112.0,"cat":"rivers","sub":"NA","note":"Flows through Grand Canyon, Arizona. Creates Lake Mead (Hoover Dam). Flows to Gulf of California."},{"n":"Orinoco River","lat":6.5,"lng":-65.0,"cat":"rivers","sub":"SA","note":"Primary river of Venezuela. Angel Falls is in this country."},{"n":"Paran\u00e1 River","lat":-24.0,"lng":-55.0,"cat":"rivers","sub":"SA","note":"Flows south through Brazil/Paraguay/Argentina. Itaip\u00fa Dam (world's 2nd largest) on Paraguay/Brazil border."},{"n":"Willamette River","lat":45.5,"lng":-122.7,"cat":"rivers","sub":"NA","note":"Portland (largest city of Oregon) is near its mouth where it joins the Columbia River."},{"n":"St. Lawrence River","lat":46.5,"lng":-72.0,"cat":"rivers","sub":"NA","note":"Flows from Great Lakes to Atlantic. Montreal and Quebec City are on it."},{"n":"Zambezi/Victoria Falls","lat":-17.92,"lng":25.85,"cat":"rivers","sub":"AF","note":"Victoria Falls \u2014 on Zambezi River, Zimbabwe/Zambia border. 'Mosi-oa-Tunya' (smoke that thunders)."},{"n":"Mount Everest","lat":27.99,"lng":86.93,"cat":"mountains","sub":"AS","note":"World's highest peak: 8,849m. On Nepal/China (Tibet) border. In the Himalayas."},{"n":"K2","lat":35.88,"lng":76.51,"cat":"mountains","sub":"AS","note":"World's 2nd highest: 8,611m. Pakistan/China border. In Karakoram Range. Deadliest major peak."},{"n":"Mont Blanc","lat":45.83,"lng":6.86,"cat":"mountains","sub":"EU","note":"Highest in Alps: 4,808m. On France-Italy border. Highest point in Western Europe."},{"n":"Aconcagua","lat":-32.65,"lng":-70.01,"cat":"mountains","sub":"SA","note":"Highest in Andes: 6,961m. In Argentina. Highest peak in Western and Southern Hemispheres."},{"n":"Denali (Mt McKinley)","lat":63.07,"lng":-151.0,"cat":"mountains","sub":"NA","note":"Highest in North America: n":"Dardanelles","lat":40.2,"lng":26.4,"cat":"straits","sub":"EU","note":"Turkey. Sea of Marmara to Aegean Sea. Together with Bosphorus controls access to Black Sea."},{"n":"Three Gorges Dam","lat":30.82,"lng":111.0,"cat":"special","sub":"AS","note":"On Yangtze River, Hubei Province, China. World's largest power station. Displaced 1+ million people."},{"n":"Hoover Dam","lat":36.01,"lng":-114.74,"cat":"special","sub":"NA","note":"On Colorado River, Nevada/Arizona border. Creates Lake Mead (largest US reservoir)."},{"n":"Panama Canal","lat":9.08,"lng":-79.68,"cat":"special","sub":"NA","note":"Connects Pacific and Atlantic oceans. Runs NW-SE (not E-W). 80km long."},{"n":"Suez Canal","lat":30.5,"lng":32.35,"cat":"special","sub":"AF","note":"Connects Mediterranean to Red Sea through Egypt. 193km long. No locks needed."},{"n":"Serengeti","lat":-2.33,"lng":34.83,"cat":"special","sub":"AF","note":"Grassland in Tanzania. World's largest lion population. Famous wildebeest migration."},{"n":"Angel Falls","lat":5.97,"lng":-62.53,"cat":"special","sub":"SA","note":"World's highest uninterrupted waterfall (979m). In Venezuela. In Canaima National Park."},{"n":"Gal\u00e1pagos Islands","lat":-0.53,"lng":-90.43,"cat":"special","sub":"SA","note":"Belongs to Ecuador. ~900km west of mainland. Darwin's evolution research site."},{"n":"Victoria Falls","lat":-17.92,"lng":25.85,"cat":"special","sub":"AF","note":"On Zambezi River, Zimbabwe/Zambia border. 'Mosi-oa-Tunya' (smoke that thunders). World's largest waterfall by width."},{"n":"Grand Canyon","lat":36.1,"lng":-112.11,"cat":"special","sub":"NA","note":"Arizona, USA. Carved by Colorado River. 446km long, up to 1,857m deep."},{"n":"Mount Kilimanjaro","lat":-3.07,"lng":37.35,"cat":"special","sub":"AF","note":"Highest peak in Africa (5,895m). In Tanzania, near Kenya border."},{"n":"Strait of Hormuz","lat":26.6,"lng":56.3,"cat":"special","sub":"AS","note":"Key oil chokepoint. ~20% of global oil supply passes through."},{"n":"Dead Sea","lat":31.5,"lng":35.5,"cat":"special","sub":"AS","note":"Lowest point on Earth's surface (-430m). Israel/Jordan. So salty you float."},{"n":"Lake Titicaca","lat":-15.8,"lng":-69.3,"cat":"special","sub":"SA","note":"Highest navigable lake (3,812m). Peru/Bolivia border."},{"n":"Sahara Desert","lat":23.0,"lng":12.0,"cat":"special","sub":"AF","note":"Largest hot desert. 9.2 million sq km. Covers northern Africa."},{"n":"Amazon Rainforest","lat":-3.5,"lng":-62.0,"cat":"special","sub":"SA","note":"World's largest rainforest. 5.5 million sq km. Mostly in Brazil."},{"n":"Atacama Desert","lat":-24.0,"lng":-69.5,"cat":"special","sub":"SA","note":"Driest non-polar desert. Some parts of northern Chile have never recorded rainfall."},{"n":"Gulf of Guinea","lat":3.0,"lng":3.0,"cat":"special","sub":"AF","note":"Prime meridian (0\u00b0) and equator intersect here. West Africa. Bight of Benin, Bight of Bonny."},{"n":"Great Barrier Reef","lat":-18.3,"lng":147.7,"cat":"special","sub":"OC","note":"World's largest coral reef system. Off Queensland coast, Australia. 2,300km long."},{"n":"Humboldt Current","lat":-12.0,"lng":-79.0,"cat":"special","sub":"SA","note":"Cold ocean current flowing north along Peru/Chile coast. Also called Peru Current."},{"n":"CN Tower","lat":43.64,"lng":-79.39,"cat":"special","sub":"NA","note":"In Toronto, Ontario (largest province by population). Was world's tallest free-standing structure 1976-2007."},{"n":"Christ the Redeemer","lat":-22.95,"lng":-43.21,"cat":"special","sub":"SA","note":"Art Deco statue atop Corcovado mountain in Rio de Janeiro, Brazil. One of New Seven Wonders."},{"n":"Wall Street","lat":40.71,"lng":-74.01,"cat":"special","sub":"NA","note":"Lower Manhattan, New York City. Location of New York Stock Exchange. Global financial symbol."},{"n":"Uluru (Ayers Rock)","lat":-25.34,"lng":131.04,"cat":"special","sub":"OC","note":"Sacred sandstone monolith in central Australia. Northern Territory. Aboriginal sacred site."}]</script>

<div id="app">
  <div id="hdr">
    <div class="logo">MAP<span>DRILL</span></div>
    <div id="search-wrap">
      <span id="search-icon">🔍</span>
      <input id="search" type="search" placeholder="Search any feature…" autocomplete="off" autocorrect="off" spellcheck="false">
      <div id="search-results"></div>
    </div>
  </div>

  <div id="filters">
    <button class="fchip on" data-cat="all">🌍 All <span class="fcount" id="cnt-all">248</span></button>
    <button class="fchip" data-cat="capitals">🏛 Capitals <span class="fcount" id="cnt-capitals"></span></button>
    <button class="fchip" data-cat="rivers">🌊 Rivers <span class="fcount" id="cnt-rivers"></span></button>
    <button class="fchip" data-cat="mountains">⛰ Mountains <span class="fcount" id="cnt-mountains"></span></button>
    <button class="fchip" data-cat="deserts">🏜 Deserts <span class="fcount" id="cnt-deserts"></span></button>
    <button class="fchip" data-cat="lakes">💧 Lakes <span class="fcount" id="cnt-lakes"></span></button>
    <button class="fchip" data-cat="straits">🚢 Straits <span class="fcount" id="cnt-straits"></span></button>
    <button class="fchip" data-cat="special">⭐ Special <span class="fcount" id="cnt-special"></span></button>
  </div>

  <div id="map"></div>
  <div id="counter">Showing <span id="shown">0</span> features</div>
</div>

<script>
const DATA = JSON.parse(document.getElementById('GEO_DATA').textContent);

// Category config
const CATS = {
  capitals: {color:'#00c8f0', icon:'🏛', label:'Capital'},
  rivers:   {color:'#4fc3f7', icon:'🌊', label:'River'},
  mountains:{color:'#ff6b35', icon:'⛰',  label:'Mountain'},
  deserts:  {color:'#ffd60a', icon:'🏜', label:'Desert'},
  lakes:    {color:'#29b6f6', icon:'💧', label:'Lake'},
  straits:  {color:'#ab47bc', icon:'🚢', label:'Strait'},
  special:  {color:'#34d975', icon:'⭐', label:'Special'},
};

const SUB_LABELS = {
  AF:'Africa',AS:'Asia',EU:'Europe',NA:'N.America',SA:'S.America',OC:'Oceania'
};

// Count by category
const counts = {};
DATA.forEach(f=>{counts[f.cat]=(counts[f.cat]||0)+1;});
Object.entries(counts).forEach(([cat,n])=>{
  const el = document.getElementById('cnt-'+cat);
  if(el) el.textContent = n;
});
document.getElementById('cnt-all').textContent = DATA.length;

// Init map
const map = L.map('map', {
  center: [20, 15],
  zoom: 2,
  minZoom: 2,
  maxZoom: 8,
  zoomControl: true,
  attributionControl: false,
});

// CartoDB Dark Matter tiles — no API key required
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Attribution (small)
L.control.attribution({prefix:false}).addTo(map);

// Build markers
let markers = [];
let layerGroup = L.layerGroup().addTo(map);
let activeCat = 'all';

function createIcon(cat){
  const cfg = CATS[cat] || {color:'#fff', icon:'•'};
  const html = `<div class="cmarker ${cat}">${cfg.icon}</div>`;
  return L.divIcon({html, className:'', iconSize:[22,22], iconAnchor:[11,11], popupAnchor:[0,-12]});
}

function createPopup(f){
  const cfg = CATS[f.cat] || {color:'#fff', label:f.cat};
  const subLabel = SUB_LABELS[f.sub] || f.sub || '';
  return `
    <div class="popup-name">${f.n}</div>
    <span class="popup-cat" style="background:${cfg.color}">${cfg.label}</span>
    <div class="popup-note">${f.note}</div>
    ${subLabel ? `<div class="popup-sub">${subLabel}</div>` : ''}
  `;
}

function buildMarkers(){
  layerGroup.clearLayers();
  markers = [];
  const filtered = activeCat === 'all' ? DATA : DATA.filter(f=>f.cat===activeCat);
  
  filtered.forEach(f=>{
    const m = L.marker([f.lat, f.lng], {icon: createIcon(f.cat)});
    m.bindPopup(createPopup(f), {maxWidth:260, className:''});
    m.feature_data = f;
    layerGroup.addLayer(m);
    markers.push(m);
  });
  
  document.getElementById('shown').textContent = filtered.length;
}

// Filter chips
document.querySelectorAll('.fchip').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeCat = btn.dataset.cat;
    buildMarkers();
  });
});

// Search
const searchEl = document.getElementById('search');
const resultsEl = document.getElementById('search-results');

function renderResults(q){
  if(!q || q.length < 2){resultsEl.style.display='none';return;}
  const lower = q.toLowerCase();
  const hits = DATA.filter(f=>
    f.n.toLowerCase().includes(lower) ||
    f.note.toLowerCase().includes(lower)
  ).slice(0,12);
  
  if(!hits.length){resultsEl.style.display='none';return;}
  
  resultsEl.innerHTML = hits.map(f=>{
    const cfg = CATS[f.cat]||{color:'#fff'};
    return `<div class="sr-item" data-lat="${f.lat}" data-lng="${f.lng}" data-name="${f.n}">
      <div class="sr-dot" style="background:${cfg.color}"></div>
      <div>
        <div class="sr-name">${f.n}</div>
        <div class="sr-sub">${SUB_LABELS[f.sub]||''} · ${cfg.label||f.cat}</div>
      </div>
    </div>`;
  }).join('');
  resultsEl.style.display = 'block';
  
  resultsEl.querySelectorAll('.sr-item').forEach(item=>{
    item.addEventListener('click', ()=>{
      const lat = parseFloat(item.dataset.lat);
      const lng = parseFloat(item.dataset.lng);
      const name = item.dataset.name;
      map.setView([lat,lng], 5, {animate:true});
      // Find and open popup
      setTimeout(()=>{
        markers.forEach(m=>{
          if(m.feature_data && m.feature_data.n === name) m.openPopup();
        });
      }, 400);
      searchEl.value = '';
      resultsEl.style.display = 'none';
    });
  });
}

searchEl.addEventListener('input', e=>renderResults(e.target.value));
searchEl.addEventListener('focus', e=>renderResults(e.target.value));
document.addEventListener('click', e=>{
  if(!e.target.closest('#search-wrap')) resultsEl.style.display='none';
});

// Prevent map zoom on double-tap in search
searchEl.addEventListener('touchend', e=>e.stopPropagation());

// Init
buildMarkers();

// Fit world
map.setView([20, 15], 2);
</script>
</body>
</html>
